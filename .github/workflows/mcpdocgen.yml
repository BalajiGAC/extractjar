name: MuleSoft MCP Documentation Generator

on:
  workflow_dispatch:
    inputs:
      jar_file:
        description: 'JAR file name (e.g. hellomule.jar)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Validate JAR exists
        run: |
          if [ ! -f "${{ github.event.inputs.jar_file }}" ]; then
            echo "ERROR: JAR file '${{ github.event.inputs.jar_file }}' not found."
            exit 1
          fi
          echo "JAR found."

      - name: Extract JAR
        run: |
          JAR_NAME="${{ github.event.inputs.jar_file }}"
          EXTRACT_DIR="extracted_${JAR_NAME%.jar}"
          mkdir -p "$EXTRACT_DIR"
          unzip -o "$JAR_NAME" -d "$EXTRACT_DIR/"
          echo "EXTRACT_DIR=$EXTRACT_DIR" >> $GITHUB_ENV
          echo "JAR_NAME=$JAR_NAME"       >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install python-docx requests

      - name: Write Python script
        run: |
          cat > /tmp/generate_docs.py << 'SCRIPTEOF'
          import os, re, json, time, xml.etree.ElementTree as ET
          from datetime import date
          import requests
          from docx import Document
          from docx.shared import Pt, RGBColor, Inches
          from docx.enum.text import WD_ALIGN_PARAGRAPH
          from docx.oxml.ns import qn
          from docx.oxml import OxmlElement

          # ─────────────────────────────────────────────────────────────
          # CONFIG — all values come from GitHub Actions env vars
          # ─────────────────────────────────────────────────────────────
          EXTRACT_DIR   = os.environ.get('EXTRACT_DIR', 'extracted')
          JAR_NAME      = os.environ.get('JAR_NAME', 'unknown.jar')
          MCP_URL       = os.environ.get('MCP_URL', '')
          TODAY         = date.today().isoformat()
          GITHUB_REF    = os.environ.get('GITHUB_REF_NAME', 'N/A')
          GITHUB_SHA    = os.environ.get('GITHUB_SHA', 'N/A')[:8]
          DOC_NAME      = JAR_NAME.replace('.jar', '') + '-flow-documentation.docx'

          # ─────────────────────────────────────────────────────────────
          # VALIDATE CONFIG
          # ─────────────────────────────────────────────────────────────
          # Mask the token in logs — show URL structure but hide token value
          safe_url = re.sub(r'wkt_token=[^&]+', 'wkt_token=***', MCP_URL)
          print('=' * 70)
          print('CONFIGURATION CHECK')
          print(f'  EXTRACT_DIR : {EXTRACT_DIR}')
          print(f'  JAR_NAME    : {JAR_NAME}')
          print(f'  MCP_URL     : {safe_url}')
          print(f'  DOC_NAME    : {DOC_NAME}')
          print('=' * 70)

          if not MCP_URL:
              raise SystemExit('FATAL: MCP_URL is not set. Add it as a GitHub Actions secret.')

          # ─────────────────────────────────────────────────────────────
          # FIND ALL XML FILES UNDER EXTRACT_DIR
          # ─────────────────────────────────────────────────────────────
          def read_file(path):
              try:
                  with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                      return f.read()
              except:
                  return ''

          print('Scanning for XML files...')
          xml_files = []
          seen = set()

          for root, dirs, files in os.walk(EXTRACT_DIR):
              for f in sorted(files):
                  if f.lower().endswith('.xml') and f not in seen:
                      full        = os.path.join(root, f)
                      file_content = read_file(full)
                      # Only include files that look like MuleSoft flows
                      if 'mulesoft.org/schema/mule' in file_content or '<mule' in file_content:
                          seen.add(f)
                          xml_files.append({
                              'filename': f,
                              'filepath': full,          # actual path on disk for file upload
                              'content':  file_content,  # text content for size checks
                          })
                          print(f'  [INCLUDE] {full} ({len(file_content)} bytes)')
                      else:
                          print(f'  [skip]    {full}')

          print(f'Total Mule XML files to send: {len(xml_files)}')

          if not xml_files:
              raise SystemExit(
                  'No Mule XML files found. Check that the JAR extracted correctly '
                  'and contains .xml files with MuleSoft namespace declarations.'
              )

          # ─────────────────────────────────────────────────────────────
          # CALL WORKATO MCP
          # Sends all XML files in one request.
          # MCP is expected to return:
          # {
          #   "status": "success",
          #   "jar_name": "...",
          #   "documents": [
          #     { "filename": "...", "content": "<markdown documentation>" },
          #     ...
          #   ]
          # }
          # ─────────────────────────────────────────────────────────────
          def mcp_request(method, params=None):
              """Send a standard MCP protocol request to the Workato MCP server."""
              safe_url = re.sub(r'wkt_token=[^&]+', 'wkt_token=***', MCP_URL)
              headers  = {
                  'Content-Type': 'application/json',
                  'Accept':       'application/json',
              }
              body = {
                  'jsonrpc': '2.0',
                  'id':      1,
                  'method':  method,
              }
              if params:
                  body['params'] = params

              print(f'  MCP request  : {method}')
              print(f'  URL          : {safe_url}')

              resp = requests.post(
                  MCP_URL,
                  json=body,
                  headers=headers,
                  timeout=300
              )
              print(f'  HTTP status  : {resp.status_code}')

              if resp.status_code == 401:
                  raise SystemExit(
                      'FATAL: 401 Unauthorized — check wkt_token in MCP_URL secret.'
                  )
              if resp.status_code not in (200, 202):
                  print(f'  Response: {resp.text[:500]}')
                  raise SystemExit(f'FATAL: MCP returned HTTP {resp.status_code}')

              try:
                  return resp.json()
              except json.JSONDecodeError:
                  print(f'  Raw response: {resp.text[:1000]}')
                  raise SystemExit('FATAL: MCP returned invalid JSON.')

          def get_tool_name():
              """
              Step 1 — Ask the MCP server to list its tools.
              This tells us the exact tool name of your Genie skill.
              """
              print('\n--- Step 1: Discovering MCP tools ---')
              try:
                  result = mcp_request('tools/list')
                  tools  = result.get('result', {}).get('tools', [])
                  print(f'  Tools found: {len(tools)}')
                  for t in tools:
                      print(f'    - name        : {t.get("name")}')
                      print(f'      description : {t.get("description","")[:80]}')

                  if not tools:
                      raise SystemExit(
                          'FATAL: No tools found in MCP server. '
                          'Make sure your Genie skill recipe is active and published in Workato.'
                      )
                  # Use the first (and only) tool
                  tool_name = tools[0].get('name')
                  print(f'\n  Using tool: {tool_name}')
                  return tool_name, tools[0]

              except SystemExit:
                  raise
              except Exception as e:
                  # Some MCP servers need initialize first — try that
                  print(f'  tools/list failed ({e}), trying initialize first...')
                  mcp_request('initialize', {
                      'protocolVersion': '2024-11-05',
                      'capabilities':    {},
                      'clientInfo':      {'name': 'github-actions', 'version': '1.0'},
                  })
                  result = mcp_request('tools/list')
                  tools  = result.get('result', {}).get('tools', [])
                  if not tools:
                      raise SystemExit('FATAL: No tools found even after initialize.')
                  tool_name = tools[0].get('name')
                  print(f'  Using tool: {tool_name}')
                  return tool_name, tools[0]

          # Load documentation prompt from file (written by a separate workflow step)
          DOC_PROMPT = open('/tmp/doc_prompt.txt').read()

          def extract_text_from_mcp_result(result):
              """Extract text content from MCP tools/call response."""
              mcp_result = result.get('result', {})
              error      = result.get('error')

              print(f'  Raw result keys : {list(result.keys())}')

              if error:
                  print(f'  MCP error: {json.dumps(error)[:300]}')
                  raise SystemExit(f'FATAL: MCP tool returned an error: {error}')

              # Standard MCP: result.content = [{type, text}, ...]
              content_blocks = mcp_result.get('content', [])
              if content_blocks:
                  text = '\n'.join(
                      b.get('text','') for b in content_blocks
                      if b.get('type') == 'text'
                  ).strip()
                  if text:
                      return text

              # Workato sometimes returns result directly as string
              if isinstance(mcp_result, str) and mcp_result.strip():
                  return mcp_result.strip()

              # Or nested under output/response/text keys
              for key in ('output','response','text','result','message','data'):
                  val = mcp_result.get(key)
                  if isinstance(val, str) and val.strip():
                      return val.strip()
                  if isinstance(val, dict):
                      for subkey in ('text','content','output','message'):
                          sv = val.get(subkey)
                          if isinstance(sv, str) and sv.strip():
                              return sv.strip()

              print(f'  Full result (debug): {json.dumps(result, indent=2)[:2000]}')
              return None

          def call_mcp(jar_name, files):
              """
              Calls the Genie skill ONE FILE AT A TIME to avoid truncation.
              Each call sends:
                - filename: the XML filename
                - content:  the XML content (chunked if needed)
                - prompt:   the documentation instruction
              Collects all responses and returns as document list.
              """
              tool_name, tool_schema = get_tool_name()

              # Filter out empty files and non-flow files
              SKIP_FILES = {'application-types.xml', 'pom.xml'}
              flow_files = [
                  f for f in files
                  if f['filename'] not in SKIP_FILES
                  and len(f['content'].strip()) > 100
              ]
              print(f'\n--- Step 2: Calling tool "{tool_name}" for {len(flow_files)} file(s) ---')

              all_docs = []

              for idx, file in enumerate(flow_files, 1):
                  fname   = file['filename']
                  fcontent = file['content']

                  print(f'\n  [{idx}/{len(flow_files)}] Processing: {fname} ({len(fcontent)} bytes)')

                  # Workato MCP truncates inputs — split each file
                  # into individual flows and send ONE FLOW PER CALL
                  # This guarantees no truncation regardless of file size
                  CHUNK_SIZE  = 4000
                  chunks      = []

                  # Try to split on individual <flow> elements
                  flow_blocks = re.findall(
                      r'(<(?:mule:)?flow[^>]*>.*?</(?:mule:)?flow>)',
                      fcontent, re.DOTALL
                  )
                  subflow_blocks = re.findall(
                      r'(<(?:mule:)?sub-flow[^>]*>.*?</(?:mule:)?sub-flow>)',
                      fcontent, re.DOTALL
                  )
                  all_flows = flow_blocks + subflow_blocks

                  if all_flows:
                      # Extract just the mule root open tag + namespaces as context header
                      header_match = re.match(r'(<mule[^>]*>)', fcontent, re.DOTALL)
                      header = header_match.group(1) if header_match else '<mule>'
                      for flow_block in all_flows:
                          # Wrap each flow in mule tags so it's valid XML context
                          chunk = f'{header}\n{flow_block}\n</mule>'
                          chunks.append(chunk)
                  elif len(fcontent) <= CHUNK_SIZE:
                      chunks = [fcontent]
                  else:
                      # Fallback: split by character limit
                      for i in range(0, len(fcontent), CHUNK_SIZE):
                          chunks.append(fcontent[i:i+CHUNK_SIZE])

                  file_docs = []
                  for ci, chunk in enumerate(chunks, 1):
                      if len(chunks) > 1:
                          print(f'    Chunk {ci}/{len(chunks)} ({len(chunk)} chars)...')

                      # Workato Genie expects parameter named 'xml'
                      # (error: missing property 'xml' confirms this)
                      arguments = {
                          'xml':      chunk,
                          'filename': fname,
                      }

                      try:
                          result = mcp_request('tools/call', {
                              'name':      tool_name,
                              'arguments': arguments,
                          })
                          text = extract_text_from_mcp_result(result)
                          if text:
                              print(f'    Got {len(text)} chars of documentation')
                              file_docs.append(text)
                          else:
                              print(f'    WARNING: No text returned for chunk {ci}')
                      except SystemExit:
                          raise
                      except Exception as e:
                          print(f'    ERROR on chunk {ci}: {e}')

                      time.sleep(2)  # small delay between calls

                  if file_docs:
                      combined = '\n\n'.join(file_docs)
                      all_docs.append({'filename': fname, 'content': combined})
                      print(f'  Done: {fname} — {len(combined)} chars total')
                  else:
                      print(f'  WARNING: No documentation generated for {fname}')

              if not all_docs:
                  raise SystemExit(
                      'FATAL: No documentation was generated for any file.\n'
                      'Check your Workato Genie skill recipe:\n'
                      '  1. Is the recipe active and running?\n'
                      '  2. Does it read the "content" and "prompt" parameters?\n'
                      '  3. Does it call an LLM with the prompt + content?\n'
                      '  4. Does it return the LLM response as text output?'
                  )

              print(f'\nTotal documents generated: {len(all_docs)}')
              return all_docs

          # Call MCP with all files
          documents = call_mcp(JAR_NAME, xml_files)

          if not documents:
              raise SystemExit('FATAL: MCP returned no documents.')

          # ─────────────────────────────────────────────────────────────
          # WORD DOC STYLE HELPERS
          # ─────────────────────────────────────────────────────────────
          BLUE_DARK  = RGBColor(0x1F, 0x49, 0x7D)
          BLUE_MID   = RGBColor(0x2E, 0x75, 0xB6)
          BLUE_LIGHT = RGBColor(0x44, 0x72, 0xC4)
          WHITE      = RGBColor(0xFF, 0xFF, 0xFF)
          GREY       = RGBColor(0x55, 0x55, 0x55)
          GREEN      = RGBColor(0x1E, 0x6B, 0x3A)
          BLACK      = RGBColor(0x00, 0x00, 0x00)
          CODE_BG    = 'F2F2F2'

          def shade_cell(cell, hex_color):
              tc   = cell._tc
              tcPr = tc.get_or_add_tcPr()
              shd  = OxmlElement('w:shd')
              shd.set(qn('w:val'),   'clear')
              shd.set(qn('w:color'), 'auto')
              shd.set(qn('w:fill'),  hex_color)
              tcPr.append(shd)

          def add_divider(doc):
              p   = doc.add_paragraph()
              p.paragraph_format.space_before = Pt(2)
              p.paragraph_format.space_after  = Pt(4)
              pPr = p._p.get_or_add_pPr()
              pBd = OxmlElement('w:pBdr')
              bt  = OxmlElement('w:bottom')
              bt.set(qn('w:val'),   'single')
              bt.set(qn('w:sz'),    '6')
              bt.set(qn('w:space'), '1')
              bt.set(qn('w:color'), '2E75B6')
              pBd.append(bt)
              pPr.append(pBd)

          def add_kv(doc, key, value, indent=False):
              p = doc.add_paragraph()
              p.paragraph_format.space_after = Pt(2)
              if indent:
                  p.paragraph_format.left_indent = Inches(0.25)
              r1 = p.add_run(f'{key}: ')
              r1.bold = True
              r1.font.color.rgb = BLUE_DARK
              r2 = p.add_run(str(value) if value else '—')
              r2.font.color.rgb = BLACK

          def add_bullet(doc, text, indent=0.25):
              p   = doc.add_paragraph()
              p.paragraph_format.left_indent = Inches(indent)
              p.paragraph_format.space_after = Pt(2)
              run = p.add_run('• ' + str(text))
              run.font.size = Pt(10)

          def add_code_block(doc, code, indent=0.25):
              for line in str(code).strip().split('\n'):
                  p   = doc.add_paragraph()
                  p.paragraph_format.left_indent  = Inches(indent)
                  p.paragraph_format.space_before = Pt(0)
                  p.paragraph_format.space_after  = Pt(0)
                  pPr = p._p.get_or_add_pPr()
                  shd = OxmlElement('w:shd')
                  shd.set(qn('w:val'),   'clear')
                  shd.set(qn('w:color'), 'auto')
                  shd.set(qn('w:fill'),  CODE_BG)
                  pPr.append(shd)
                  run = p.add_run(line if line.strip() else ' ')
                  run.font.name      = 'Courier New'
                  run.font.size      = Pt(8)
                  run.font.color.rgb = BLACK
              doc.add_paragraph().paragraph_format.space_after = Pt(4)

          def add_markdown_table(doc, lines):
              rows = []
              for line in lines:
                  line = line.strip()
                  if not line or re.match(r'^\|[-| :]+\|$', line):
                      continue
                  cells = [c.strip() for c in line.strip('|').split('|')]
                  rows.append(cells)
              if not rows:
                  return
              headers  = rows[0]
              data     = rows[1:]
              num_cols = len(headers)
              col_w    = [6.3 / num_cols] * num_cols
              tbl      = doc.add_table(rows=1, cols=num_cols)
              tbl.style = 'Table Grid'
              for i, h in enumerate(headers):
                  hdr_cells = tbl.rows[0].cells
                  hdr_cells[i].width = Inches(col_w[i])
                  shade_cell(hdr_cells[i], '2E75B6')
                  run = hdr_cells[i].paragraphs[0].add_run(h)
                  run.bold = True
                  run.font.color.rgb = WHITE
                  run.font.size = Pt(10)
              for ri, row in enumerate(data):
                  cells = tbl.add_row().cells
                  fill  = 'EBF3FB' if ri % 2 == 0 else 'FFFFFF'
                  for i in range(num_cols):
                      val = row[i] if i < len(row) else ''
                      cells[i].width = Inches(col_w[i])
                      shade_cell(cells[i], fill)
                      run = cells[i].paragraphs[0].add_run(val)
                      run.font.size = Pt(9)
              doc.add_paragraph().paragraph_format.space_after = Pt(4)

          # ─────────────────────────────────────────────────────────────
          # MARKDOWN → WORD RENDERER
          # Converts the MCP's markdown documentation into a Word doc.
          # Handles:
          #   ## Heading 2       → Word Heading 2
          #   ### Heading 3      → Word Heading 3
          #   **bold text**      → Bold run
          #   ```code block```   → Grey monospace code block
          #   | table | rows |   → Styled Word table
          #   - bullet           → Bullet point
          #   blank line         → spacing
          #   plain text         → paragraph
          # ─────────────────────────────────────────────────────────────
          def render_markdown_to_doc(doc, markdown_text):
              lines        = markdown_text.split('\n')
              i            = 0
              in_code      = False
              code_lines   = []
              table_lines  = []
              in_table     = False

              while i < len(lines):
                  line = lines[i]

                  # ── Code block start/end ──────────────────────────────
                  if line.strip().startswith('```'):
                      if not in_code:
                          in_code    = True
                          code_lines = []
                          i += 1
                          continue
                      else:
                          # End of code block — render it
                          in_code = False
                          if code_lines:
                              add_code_block(doc, '\n'.join(code_lines))
                          code_lines = []
                          i += 1
                          continue

                  if in_code:
                      code_lines.append(line)
                      i += 1
                      continue

                  # ── Table detection ───────────────────────────────────
                  if line.strip().startswith('|'):
                      table_lines.append(line)
                      i += 1
                      continue
                  else:
                      if table_lines:
                          add_markdown_table(doc, table_lines)
                          table_lines = []

                  stripped = line.strip()

                  # ── Headings ──────────────────────────────────────────
                  if stripped.startswith('#### '):
                      doc.add_heading(stripped[5:].strip(), level=4)

                  elif stripped.startswith('### '):
                      doc.add_heading(stripped[4:].strip(), level=3)

                  elif stripped.startswith('## '):
                      doc.add_heading(stripped[3:].strip(), level=2)
                      add_divider(doc)

                  elif stripped.startswith('# '):
                      doc.add_heading(stripped[2:].strip(), level=1)

                  # ── Bullet points ─────────────────────────────────────
                  elif stripped.startswith('- ') or stripped.startswith('* '):
                      text = stripped[2:].strip()
                      # Handle **bold:** prefix in bullet
                      text = re.sub(r'\*\*(.+?)\*\*', r'\1', text)
                      if ':' in text and text.index(':') < 40:
                          k, _, v = text.partition(':')
                          p = doc.add_paragraph()
                          p.paragraph_format.left_indent = Inches(0.25)
                          p.paragraph_format.space_after = Pt(2)
                          r1 = p.add_run('• ' + k + ': ')
                          r1.bold = True
                          r1.font.color.rgb = BLUE_DARK
                          r2 = p.add_run(v.strip())
                          r2.font.color.rgb = BLACK
                      else:
                          add_bullet(doc, text)

                  # ── Step headers: **Step N: Component** ───────────────
                  elif stripped.startswith('**Step ') and '**' in stripped[3:]:
                      # Render as a styled step heading
                      text = re.sub(r'\*\*(.+?)\*\*', r'\1', stripped).strip()
                      step_match = re.match(r'(Step\s+\w+):\s*(.+)', text)
                      p = doc.add_paragraph()
                      p.paragraph_format.space_before = Pt(6)
                      p.paragraph_format.space_after  = Pt(2)
                      if step_match:
                          r1 = p.add_run(step_match.group(1) + '  ')
                          r1.bold = True
                          r1.font.color.rgb = BLUE_MID
                          r1.font.size = Pt(11)
                          r2 = p.add_run(step_match.group(2))
                          r2.bold = True
                          r2.font.size = Pt(11)
                          r2.font.color.rgb = BLACK
                      else:
                          r = p.add_run(text)
                          r.bold = True
                          r.font.color.rgb = BLUE_MID

                  # ── DataWeave label line ───────────────────────────────
                  elif stripped.lower().startswith('dataweave:') or stripped.lower() == 'dataweave':
                      lp = doc.add_paragraph()
                      lp.paragraph_format.left_indent = Inches(0.3)
                      lp.paragraph_format.space_after = Pt(1)
                      lr = lp.add_run('DataWeave Script:')
                      lr.italic = True
                      lr.font.color.rgb = GREEN
                      lr.font.size = Pt(9)

                  # ── Horizontal rule ───────────────────────────────────
                  elif stripped == '---' or stripped == '***':
                      add_divider(doc)

                  # ── Blank line ────────────────────────────────────────
                  elif stripped == '':
                      p = doc.add_paragraph()
                      p.paragraph_format.space_after = Pt(2)

                  # ── Plain paragraph with possible inline bold ──────────
                  else:
                      p   = doc.add_paragraph()
                      p.paragraph_format.space_after = Pt(3)
                      # Split on **bold** markers
                      parts = re.split(r'\*\*(.+?)\*\*', stripped)
                      for idx, part in enumerate(parts):
                          if not part:
                              continue
                          run = p.add_run(part)
                          run.font.size = Pt(10)
                          if idx % 2 == 1:  # odd parts are inside **...**
                              run.bold = True
                              run.font.color.rgb = BLUE_DARK

                  i += 1

              # Flush any remaining table or code block
              if table_lines:
                  add_markdown_table(doc, table_lines)
              if in_code and code_lines:
                  add_code_block(doc, '\n'.join(code_lines))

          # ─────────────────────────────────────────────────────────────
          # BUILD WORD DOCUMENT
          # ─────────────────────────────────────────────────────────────
          doc = Document()

          # Cover page
          cp = doc.add_paragraph()
          cp.alignment = WD_ALIGN_PARAGRAPH.CENTER
          cr = cp.add_run('MuleSoft Flow Documentation')
          cr.bold = True
          cr.font.size = Pt(28)
          cr.font.color.rgb = BLUE_DARK

          doc.add_paragraph()
          sp = doc.add_paragraph()
          sp.alignment = WD_ALIGN_PARAGRAPH.CENTER
          sr = sp.add_run(f'Generated from: {JAR_NAME}')
          sr.font.size = Pt(14)
          sr.font.color.rgb = BLUE_LIGHT

          doc.add_paragraph()
          mp = doc.add_paragraph()
          mp.alignment = WD_ALIGN_PARAGRAPH.CENTER
          mr = mp.add_run(f'Date: {TODAY}  |  Branch: {GITHUB_REF}  |  Commit: {GITHUB_SHA}')
          mr.font.size = Pt(10)
          mr.font.color.rgb = GREY

          doc.add_paragraph()
          np = doc.add_paragraph()
          np.alignment = WD_ALIGN_PARAGRAPH.CENTER
          nr = np.add_run('Generated via Workato MCP Integration')
          nr.font.size = Pt(10)
          nr.font.color.rgb = GREY

          doc.add_page_break()

          # Summary
          doc.add_heading('Summary', level=1)
          add_kv(doc, 'JAR File',         JAR_NAME)
          add_kv(doc, 'Date',             TODAY)
          add_kv(doc, 'Branch / Commit',  f'{GITHUB_REF} / {GITHUB_SHA}')
          add_kv(doc, 'Files Documented', str(len(documents)))
          doc.add_paragraph()
          add_divider(doc)
          doc.add_page_break()

          # Per-file documentation — render MCP's markdown into Word
          for doc_item in documents:
              fname   = doc_item.get('filename', 'unknown.xml')
              content = doc_item.get('content',  '').strip()

              doc.add_heading(f'File: {fname}', level=1)

              if not content:
                  p = doc.add_paragraph()
                  p.add_run('No documentation returned for this file.').italic = True
                  add_divider(doc)
                  doc.add_paragraph()
                  continue

              render_markdown_to_doc(doc, content)
              doc.add_page_break()

          doc.save(DOC_NAME)
          print(f'\nSaved: {DOC_NAME}')
          SCRIPTEOF

