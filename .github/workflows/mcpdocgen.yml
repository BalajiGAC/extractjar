      - name: Run documentation generator
        env:
          MCP_URL:     ${{ secrets.MCP_URL }}
          EXTRACT_DIR: ${{ env.EXTRACT_DIR }}
          JAR_NAME:    ${{ env.JAR_NAME }}
        run: python3 /tmp/generate_docs.py

      - name: Commit documentation to master
        run: |
          JAR_BASE="${{ github.event.inputs.jar_file }}"
          DOC_NAME="${JAR_BASE%.jar}-flow-documentation.docx"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git

          git pull origin master --rebase

          git add "$DOC_NAME"

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "docs: flow documentation for ${{ github.event.inputs.jar_file }}"
            git push origin HEAD:master
            echo "Pushed to master."
          fi
