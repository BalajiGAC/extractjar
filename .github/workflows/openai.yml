name: MuleSoft JAR Documentation Generator (Gemini API)

on:
  workflow_dispatch:
    inputs:
      jar_file:
        description: 'JAR file name (e.g. hellomule.jar)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Validate JAR exists
        run: |
          if [ ! -f "${{ github.event.inputs.jar_file }}" ]; then
            echo "ERROR: JAR file '${{ github.event.inputs.jar_file }}' not found."
            exit 1
          fi

      - name: Extract JAR
        run: |
          JAR_NAME="${{ github.event.inputs.jar_file }}"
          EXTRACT_DIR="extracted_${JAR_NAME%.jar}"
          mkdir -p "$EXTRACT_DIR"
          unzip -o "$JAR_NAME" -d "$EXTRACT_DIR/"
          echo "EXTRACT_DIR=$EXTRACT_DIR" >> $GITHUB_ENV
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV

      - name: Install dependencies
        run: pip install python-docx google-genai

      - name: Write Python script
        run: |
          cat > /tmp/generate_docs.py << 'SCRIPTEOF'
          import os, re, time, tempfile, xml.etree.ElementTree as ET
          from datetime import date
          from google import genai
          from google.genai import types
          from google.genai import errors as genai_errors
          from docx import Document
          from docx.shared import Pt, RGBColor, Inches
          from docx.enum.text import WD_ALIGN_PARAGRAPH
          from docx.oxml.ns import qn
          from docx.oxml import OxmlElement

          EXTRACT_DIR  = os.environ.get('EXTRACT_DIR', 'extracted')
          JAR_NAME     = os.environ.get('JAR_NAME', 'unknown.jar')
          TODAY        = date.today().isoformat()
          GITHUB_REF   = os.environ.get('GITHUB_REF_NAME', 'N/A')
          GITHUB_SHA   = os.environ.get('GITHUB_SHA', 'N/A')[:8]
          DOC_NAME     = JAR_NAME.replace('.jar', '') + '-flow-documentation.docx'
          GEMINI_MODEL = os.environ.get('GEMINI_MODEL', 'gemini-3.5-flash')

          # ── Safe API key diagnostic — never prints the actual key ──
          _raw_key = os.environ.get('GEMINI_API_KEY', '')
          _key     = _raw_key.strip()
          print('=' * 70)
          print('API KEY DIAGNOSTIC')
          print(f'  key present          : {bool(_key)}')
          print(f'  key length           : {len(_key)}')
          print(f'  key had whitespace   : {_raw_key != _key}')
          print(f'  first 6 chars        : {_key[:6] if _key else "(empty)"}...')
          print('=' * 70)
          if not _key:
              raise SystemExit(
                  'FATAL: GEMINI_API_KEY is empty. Check that the secret is set '
                  'as a Repository secret (not Environment secret unless this job '
                  'declares environment:), and that the workflow step passes it via env:.'
              )

          client       = genai.Client(api_key=_key)
          MULE_CORE_NS = 'http://www.mulesoft.org/schema/mule/core'

          # ── Token usage + timing accumulators (populated across all API calls) ──
          PROCESS_START_TIME  = time.time()
          TOTAL_INPUT_TOKENS  = 0
          TOTAL_OUTPUT_TOKENS = 0
          TOTAL_TOKENS        = 0

          def format_duration(seconds):
              seconds = int(round(seconds))
              hours, rem = divmod(seconds, 3600)
              minutes, secs = divmod(rem, 60)
              if hours:
                  return f'{hours}h {minutes}m {secs}s'
              if minutes:
                  return f'{minutes}m {secs}s'
              return f'{secs}s'

          def read_xml(path):
              try:
                  with open(path, 'r', encoding='utf-8', errors='ignore') as f:
                      return f.read()
              except:
                  return ''

          # ── Full diagnostic dump — show absolutely everything on disk ──
          print('=' * 70)
          print(f'EXTRACT_DIR env var = {EXTRACT_DIR!r}')
          print(f'EXTRACT_DIR exists  = {os.path.exists(EXTRACT_DIR)}')
          print(f'Current working dir = {os.getcwd()}')
          print(f'Contents of cwd     = {os.listdir(".")}')
          print('=' * 70)

          if os.path.exists(EXTRACT_DIR):
              print(f'--- Full file tree under {EXTRACT_DIR} ---')
              for root, dirs, files in os.walk(EXTRACT_DIR):
                  for f in files:
                      print(f'  {os.path.join(root, f)}')
          else:
              print(f'!!! EXTRACT_DIR does not exist: {EXTRACT_DIR}')

          # ── Collect every .xml file anywhere under EXTRACT_DIR ──
          xml_files = []
          seen_filenames = set()

          if os.path.exists(EXTRACT_DIR):
              for root, dirs, files in os.walk(EXTRACT_DIR):
                  for f in sorted(files):
                      if f.lower().endswith('.xml'):
                          full = os.path.join(root, f)
                          if f not in seen_filenames:
                              seen_filenames.add(f)
                              xml_files.append((f, full))

          print('=' * 70)
          print(f'Total .xml files included for documentation: {len(xml_files)}')
          for fname, fpath in xml_files:
              size = os.path.getsize(fpath) if os.path.exists(fpath) else 0
              print(f'  {fpath}  ({size} bytes)')
          print('=' * 70)

          SYSTEM_PROMPT = open('/tmp/gemini_prompt.txt').read()

          def call_gemini(filename, xml_path):
              """
              Uploads the XML file itself via the Gemini Files API instead of
              pasting its content inline as text. This removes the old ~90k
              character inline truncation limit — the file is sent whole and
              Gemini reads it directly.
              """
              size = os.path.getsize(xml_path)
              print(f'  Uploading to Gemini Files API: {filename} ({size} bytes)...')
              uploaded = None
              try:
                  uploaded = client.files.upload(
                      file=xml_path,
                      config=dict(mime_type='text/xml'),
                  )

                  prompt_text = f'Document ALL flows in this MuleSoft XML file named `{filename}`.'

                  print(f'  Calling {GEMINI_MODEL} for: {filename}...')
                  response = client.models.generate_content(
                      model=GEMINI_MODEL,
                      contents=[uploaded, prompt_text],
                      config=types.GenerateContentConfig(
                          system_instruction=SYSTEM_PROMPT,
                          max_output_tokens=8000,
                      ),
                  )

                  global TOTAL_INPUT_TOKENS, TOTAL_OUTPUT_TOKENS, TOTAL_TOKENS
                  usage = getattr(response, 'usage_metadata', None)
                  if usage:
                      in_tok  = usage.prompt_token_count or 0
                      out_tok = usage.candidates_token_count or 0
                      tot_tok = usage.total_token_count or (in_tok + out_tok)
                      TOTAL_INPUT_TOKENS  += in_tok
                      TOTAL_OUTPUT_TOKENS += out_tok
                      TOTAL_TOKENS        += tot_tok
                      print(f'  Tokens for {filename} - input: {in_tok}, output: {out_tok}, total: {tot_tok}')
                  else:
                      print(f'  (usage_metadata not available for {filename})')

                  return (response.text or '').strip()

              except genai_errors.ClientError as e:
                  print('=' * 70)
                  print(f'  CLIENT/AUTH ERROR for {filename}: {e}')
                  print('  This usually means the API key was rejected by Gemini, or')
                  print('  the request was otherwise invalid. Most likely causes:')
                  print('    1. Secret value has a typo, truncation, or extra whitespace')
                  print('    2. Secret is an Environment secret but job has no environment: set')
                  print('    3. Key was revoked/rotated in Google AI Studio')
                  print('    4. Wrong secret name referenced in workflow env: block')
                  print('=' * 70)
                  raise SystemExit(1)
              except Exception as e:
                  print(f'  API error for {filename}: {e}')
                  return None
              finally:
                  # Clean up the uploaded file on Gemini's side once we're done with it.
                  if uploaded is not None:
                      try:
                          client.files.delete(name=uploaded.name)
                      except Exception as cleanup_err:
                          print(f'  (non-fatal) could not delete uploaded file: {cleanup_err}')

          def parse_flow_blocks(response_text):
              blocks = []
              parts = re.split(r'@@FLOW_START@@', response_text)
              for part in parts:
                  part = part.strip()
                  if '@@FLOW_END@@' not in part:
                      continue
                  content = part.split('@@FLOW_END@@')[0].strip()
                  name_match = re.search(r'FLOW_NAME:\s*(.+)', content)
                  type_match = re.search(r'FLOW_TYPE:\s*(.+)', content)
                  name  = name_match.group(1).strip() if name_match else 'Unnamed Flow'
                  ftype = type_match.group(1).strip() if type_match else 'flow'
                  blocks.append({'name': name, 'type': ftype, 'raw': content})
              return blocks

          SECTION_NAMES = [
              'OVERVIEW','FLOW DIAGRAM','TRIGGER','INPUTS',
              'LOGIC STEPS','CONNECTORS USED','ERROR HANDLING',
              'OUTPUTS','FLOW REFERENCES','CONFIGURATION PROPERTIES',
          ]

          def get_section(raw, section_name):
              marker = f'##{section_name}##'
              if marker not in raw:
                  pattern = rf'{re.escape(section_name)}\s*\n(.*?)(?=\n(?:{"|".join(re.escape(s) for s in SECTION_NAMES)})\s*\n|##|$)'
                  match = re.search(pattern, raw, re.DOTALL)
                  return match.group(1).strip() if match else ''
              after  = raw.split(marker, 1)[1]
              end    = re.search(r'##[A-Z]', after)
              result = after[:end.start()].strip() if end else after.strip()
              return result

          BLUE_DARK  = RGBColor(0x1F, 0x49, 0x7D)
          BLUE_MID   = RGBColor(0x2E, 0x75, 0xB6)
          BLUE_LIGHT = RGBColor(0x44, 0x72, 0xC4)
          WHITE      = RGBColor(0xFF, 0xFF, 0xFF)
          GREY       = RGBColor(0x55, 0x55, 0x55)
          GREEN      = RGBColor(0x1E, 0x6B, 0x3A)
          BLACK      = RGBColor(0x00, 0x00, 0x00)
          CODE_BG    = 'F2F2F2'

          def shade_cell(cell, hex_color):
              tc = cell._tc
              tcPr = tc.get_or_add_tcPr()
              shd = OxmlElement('w:shd')
              shd.set(qn('w:val'), 'clear')
              shd.set(qn('w:color'), 'auto')
              shd.set(qn('w:fill'), hex_color)
              tcPr.append(shd)

          def add_divider(doc):
              p = doc.add_paragraph()
              p.paragraph_format.space_before = Pt(2)
              p.paragraph_format.space_after = Pt(4)
              pPr = p._p.get_or_add_pPr()
              pBd = OxmlElement('w:pBdr')
              bt = OxmlElement('w:bottom')
              bt.set(qn('w:val'), 'single')
              bt.set(qn('w:sz'), '6')
              bt.set(qn('w:space'), '1')
              bt.set(qn('w:color'), '2E75B6')
              pBd.append(bt)
              pPr.append(pBd)

          def add_kv(doc, key, value, indent=False):
              p = doc.add_paragraph()
              p.paragraph_format.space_after = Pt(2)
              if indent:
                  p.paragraph_format.left_indent = Inches(0.25)
              r1 = p.add_run(f'{key}: ')
              r1.bold = True
              r1.font.color.rgb = BLUE_DARK
              r2 = p.add_run(str(value) if value else '---')
              r2.font.color.rgb = BLACK

          def add_bullet(doc, text, indent=0.25, color=None):
              p = doc.add_paragraph()
              p.paragraph_format.left_indent = Inches(indent)
              p.paragraph_format.space_after = Pt(2)
              run = p.add_run('- ' + str(text))
              run.font.size = Pt(10)
              if color:
                  run.font.color.rgb = color

          def add_code_block(doc, code, indent=0.25):
              for line in str(code).strip().split('\n'):
                  p = doc.add_paragraph()
                  p.paragraph_format.left_indent = Inches(indent)
                  p.paragraph_format.space_before = Pt(0)
                  p.paragraph_format.space_after = Pt(0)
                  pPr = p._p.get_or_add_pPr()
                  shd = OxmlElement('w:shd')
                  shd.set(qn('w:val'), 'clear')
                  shd.set(qn('w:color'), 'auto')
                  shd.set(qn('w:fill'), CODE_BG)
                  pPr.append(shd)
                  run = p.add_run(line if line.strip() else ' ')
                  run.font.name = 'Courier New'
                  run.font.size = Pt(8)
                  run.font.color.rgb = BLACK
              doc.add_paragraph().paragraph_format.space_after = Pt(4)

          def add_table_from_markdown(doc, md_table_text):
              lines = [l.strip() for l in md_table_text.strip().split('\n')
                       if l.strip() and not re.match(r'^\|[-| :]+\|$', l.strip())]
              if not lines:
                  return
              rows = []
              for line in lines:
                  cells = [c.strip() for c in line.strip('|').split('|')]
                  rows.append(cells)
              if not rows:
                  return
              headers = rows[0]
              data_rows = rows[1:]
              num_cols = len(headers)
              col_w = [6.3 / num_cols] * num_cols
              tbl = doc.add_table(rows=1, cols=num_cols)
              tbl.style = 'Table Grid'
              hdr_cells = tbl.rows[0].cells
              for i, h in enumerate(headers):
                  hdr_cells[i].width = Inches(col_w[i])
                  shade_cell(hdr_cells[i], '2E75B6')
                  run = hdr_cells[i].paragraphs[0].add_run(h)
                  run.bold = True
                  run.font.color.rgb = WHITE
                  run.font.size = Pt(10)
              for ri, row_data in enumerate(data_rows):
                  cells = tbl.add_row().cells
                  fill = 'EBF3FB' if ri % 2 == 0 else 'FFFFFF'
                  for i in range(num_cols):
                      val = row_data[i] if i < len(row_data) else ''
                      cells[i].width = Inches(col_w[i])
                      shade_cell(cells[i], fill)
                      run = cells[i].paragraphs[0].add_run(val)
                      run.font.size = Pt(9)
              doc.add_paragraph().paragraph_format.space_after = Pt(4)

          def render_logic_steps(doc, steps_text):
              if not steps_text.strip():
                  doc.add_paragraph('').add_run('No logic steps found.').italic = True
                  return
              step_pattern = re.compile(
                  r'^(STEP\s+[\w.]+:\s*.+?)(?=^STEP\s+[\w.]+:|\Z)',
                  re.MULTILINE | re.DOTALL
              )
              step_blocks = step_pattern.findall(steps_text)
              if not step_blocks:
                  step_blocks = [steps_text]
              for block in step_blocks:
                  block = block.strip()
                  if not block:
                      continue
                  lines = block.split('\n')
                  first_line = lines[0].strip()
                  step_match = re.match(r'STEP\s+([\w.]+):\s*(.+)', first_line, re.IGNORECASE)
                  if step_match:
                      step_num = step_match.group(1)
                      comp_name = step_match.group(2).strip()
                  else:
                      step_num = '?'
                      comp_name = first_line
                  p = doc.add_paragraph()
                  p.paragraph_format.space_after = Pt(2)
                  p.paragraph_format.space_before = Pt(6)
                  num_run = p.add_run(f'Step {step_num}  ')
                  num_run.bold = True
                  num_run.font.color.rgb = BLUE_MID
                  num_run.font.size = Pt(11)
                  comp_run = p.add_run(comp_name)
                  comp_run.bold = True
                  comp_run.font.size = Pt(11)
                  comp_run.font.color.rgb = BLACK
                  body = '\n'.join(lines[1:])
                  desc_match = re.search(
                      r'Description:\s*(.+?)(?=\nDataWeave:|\nSQL:|\nROUTE\s|\nSTEP\s|\Z)',
                      body, re.DOTALL
                  )
                  if desc_match:
                      dp = doc.add_paragraph()
                      dp.paragraph_format.left_indent = Inches(0.3)
                      dp.paragraph_format.space_after = Pt(2)
                      dp.add_run(desc_match.group(1).strip()).font.size = Pt(10)
                  for dw_label in ['DataWeave', 'SQL']:
                      dw_match = re.search(
                          rf'{dw_label}:\s*\n```[a-z]*\n(.*?)```',
                          body, re.DOTALL
                      )
                      if dw_match and dw_match.group(1).strip():
                          lp = doc.add_paragraph()
                          lp.paragraph_format.left_indent = Inches(0.3)
                          lp.paragraph_format.space_after = Pt(1)
                          lr = lp.add_run(f'{dw_label} Script:')
                          lr.italic = True
                          lr.font.color.rgb = GREEN
                          lr.font.size = Pt(9)
                          add_code_block(doc, dw_match.group(1).strip(), indent=0.4)
                  route_pattern = re.compile(
                      r'^(\s*ROUTE\s+.+?)(?=^\s*ROUTE\s+|\Z)',
                      re.MULTILINE | re.DOTALL
                  )
                  for rb in route_pattern.findall(body):
                      rb = rb.strip()
                      if not rb:
                          continue
                      route_label_match = re.match(r'ROUTE\s+(.+)', rb.split('\n')[0].strip())
                      route_label = route_label_match.group(1).strip() if route_label_match else 'Route'
                      rp = doc.add_paragraph()
                      rp.paragraph_format.left_indent = Inches(0.35)
                      rp.paragraph_format.space_after = Pt(1)
                      rr = rp.add_run(f'Route: {route_label}')
                      rr.bold = True
                      rr.font.color.rgb = BLUE_LIGHT
                      rr.font.size = Pt(10)
                      inner_steps = re.compile(
                          r'^(\s*STEP\s+[\w.]+:\s*.+?)(?=^\s*STEP\s+[\w.]+:|\Z)',
                          re.MULTILINE | re.DOTALL
                      ).findall(rb)
                      for inner in inner_steps:
                          inner = inner.strip()
                          inner_lines = inner.split('\n')
                          inner_first = inner_lines[0].strip()
                          im = re.match(r'STEP\s+([\w.]+):\s*(.+)', inner_first, re.IGNORECASE)
                          if im:
                              in_num = im.group(1)
                              in_comp = im.group(2).strip()
                          else:
                              in_num = '?'
                              in_comp = inner_first
                          ip = doc.add_paragraph()
                          ip.paragraph_format.left_indent = Inches(0.5)
                          ip.paragraph_format.space_after = Pt(1)
                          ir1 = ip.add_run(f'Step {in_num}  ')
                          ir1.bold = True
                          ir1.font.color.rgb = BLUE_MID
                          ir1.font.size = Pt(10)
                          ir2 = ip.add_run(in_comp)
                          ir2.bold = True
                          ir2.font.size = Pt(10)
                          ir2.font.color.rgb = BLACK
                          inner_body = '\n'.join(inner_lines[1:])
                          id_match = re.search(
                              r'Description:\s*(.+?)(?=\nDataWeave:|\nSQL:|\nSTEP\s|\Z)',
                              inner_body, re.DOTALL
                          )
                          if id_match:
                              idp = doc.add_paragraph()
                              idp.paragraph_format.left_indent = Inches(0.65)
                              idp.paragraph_format.space_after = Pt(1)
                              idp.add_run(id_match.group(1).strip()).font.size = Pt(9)
                          for dw_label in ['DataWeave', 'SQL']:
                              idw = re.search(
                                  rf'{dw_label}:\s*\n```[a-z]*\n(.*?)```',
                                  inner_body, re.DOTALL
                              )
                              if idw and idw.group(1).strip():
                                  ilp = doc.add_paragraph()
                                  ilp.paragraph_format.left_indent = Inches(0.65)
                                  ilp.paragraph_format.space_after = Pt(1)
                                  ilr = ilp.add_run(f'{dw_label} Script:')
                                  ilr.italic = True
                                  ilr.font.color.rgb = GREEN
                                  ilr.font.size = Pt(9)
                                  add_code_block(doc, idw.group(1).strip(), indent=0.75)
                  sep = doc.add_paragraph()
                  sep.paragraph_format.space_after = Pt(3)

          def render_flow(doc, block, filename):
              name  = block['name']
              ftype = block['type']
              raw   = block['raw']

              doc.add_heading(f'Flow: {name}', level=2)
              add_kv(doc, 'Source File', filename)
              add_kv(doc, 'Flow Type', ftype)
              doc.add_paragraph()

              overview = get_section(raw, 'OVERVIEW')
              if overview:
                  doc.add_heading('Overview', level=3)
                  p = doc.add_paragraph(overview)
                  p.paragraph_format.space_after = Pt(6)

              diagram = get_section(raw, 'FLOW DIAGRAM')
              if diagram and diagram.strip():
                  doc.add_heading('Flow Diagram', level=3)
                  diagram_clean = re.sub(r'^```[a-z]*\n?', '', diagram.strip())
                  diagram_clean = re.sub(r'\n?```$', '', diagram_clean).strip()
                  add_code_block(doc, diagram_clean, indent=0.2)

              trigger = get_section(raw, 'TRIGGER')
              if trigger:
                  doc.add_heading('Trigger', level=3)
                  for line in trigger.strip().split('\n'):
                      line = line.strip().lstrip('-').strip()
                      if not line:
                          continue
                      if ':' in line:
                          k, _, v = line.partition(':')
                          v = v.strip()
                          if v and v.lower() not in ('n/a','none','omit','<read from xml>',''):
                              add_kv(doc, k.strip(), v, indent=True)
                  doc.add_paragraph()

              inputs = get_section(raw, 'INPUTS')
              if inputs:
                  doc.add_heading('Inputs', level=3)
                  for line in inputs.strip().split('\n'):
                      line = line.strip().lstrip('-').strip()
                      if line and not line.startswith('<'):
                          add_bullet(doc, line)
                  doc.add_paragraph()

              logic = get_section(raw, 'LOGIC STEPS')
              doc.add_heading('Logic Steps', level=3)
              intro = doc.add_paragraph()
              intro.add_run(
                  'Each step is documented below. DataWeave scripts are shown '
                  'inline immediately beneath the step they belong to.'
              ).italic = True
              intro.paragraph_format.space_after = Pt(4)
              if logic.strip():
                  render_logic_steps(doc, logic)
              else:
                  doc.add_paragraph('').add_run('No logic steps found.').italic = True
              doc.add_paragraph()

              connectors = get_section(raw, 'CONNECTORS USED')
              doc.add_heading('Connectors & Components Used', level=3)
              if connectors and '|' in connectors:
                  add_table_from_markdown(doc, connectors)
              elif connectors:
                  for line in connectors.strip().split('\n'):
                      line = line.strip().lstrip('-').strip()
                      if line:
                          add_bullet(doc, line)
              else:
                  doc.add_paragraph('').add_run('None').italic = True
              doc.add_paragraph()

              error = get_section(raw, 'ERROR HANDLING')
              doc.add_heading('Error Handling', level=3)
              if error and error.strip().lower() not in ('none',''):
                  for line in error.strip().split('\n'):
                      line = line.strip().lstrip('-').strip()
                      if not line:
                          continue
                      if ':' in line:
                          k, _, v = line.partition(':')
                          if v.strip() and v.strip().lower() not in ('none','n/a'):
                              add_kv(doc, k.strip(), v.strip(), indent=True)
                      else:
                          add_bullet(doc, line)
              else:
                  add_bullet(doc, 'Strategy: None explicitly defined')
                  add_bullet(doc, 'Behaviour: Errors propagate to the default Mule error handler')
              doc.add_paragraph()

              outputs = get_section(raw, 'OUTPUTS')
              if outputs:
                  doc.add_heading('Outputs', level=3)
                  for line in outputs.strip().split('\n'):
                      line = line.strip().lstrip('-').strip()
                      if not line or line.startswith('<'):
                          continue
                      if ':' in line:
                          k, _, v = line.partition(':')
                          if v.strip():
                              add_kv(doc, k.strip(), v.strip(), indent=True)
                      else:
                          add_bullet(doc, line)
                  doc.add_paragraph()

              refs = get_section(raw, 'FLOW REFERENCES')
              doc.add_heading('Flow References', level=3)
              if refs and refs.strip().lower() not in ('none',''):
                  for line in refs.strip().split('\n'):
                      line = line.strip().lstrip('-').strip()
                      if line and not line.startswith('<'):
                          add_bullet(doc, line)
              else:
                  doc.add_paragraph('').add_run('None').italic = True

              props = get_section(raw, 'CONFIGURATION PROPERTIES')
              doc.add_heading('Configuration Properties Used', level=3)
              if props and props.strip().lower() not in ('none',''):
                  for line in props.strip().split('\n'):
                      line = line.strip().lstrip('-').strip()
                      if line and not line.startswith('<'):
                          add_bullet(doc, line)
              else:
                  doc.add_paragraph('').add_run('None').italic = True

              add_divider(doc)
              doc.add_paragraph()

          all_results = []
          for fname, fpath in xml_files:
              if not os.path.exists(fpath) or os.path.getsize(fpath) == 0:
                  print(f'  Skipping empty/missing: {fname}')
                  continue
              response = call_gemini(fname, fpath)
              if response:
                  blocks = parse_flow_blocks(response)
                  print(f'  Parsed {len(blocks)} flow(s) from {fname}')
                  all_results.append((fname, blocks))
              time.sleep(1)

          total_flows = sum(len(b) for _, b in all_results)
          print(f'Total flows documented: {total_flows}')

          doc = Document()
          cp = doc.add_paragraph()
          cp.alignment = WD_ALIGN_PARAGRAPH.CENTER
          cr = cp.add_run('MuleSoft Flow Documentation')
          cr.bold = True
          cr.font.size = Pt(28)
          cr.font.color.rgb = BLUE_DARK
          doc.add_paragraph()
          sp = doc.add_paragraph()
          sp.alignment = WD_ALIGN_PARAGRAPH.CENTER
          sr = sp.add_run(f'Generated from: {JAR_NAME}')
          sr.font.size = Pt(14)
          sr.font.color.rgb = BLUE_LIGHT
          doc.add_paragraph()
          mp = doc.add_paragraph()
          mp.alignment = WD_ALIGN_PARAGRAPH.CENTER
          mr = mp.add_run(f'Date: {TODAY}  |  Branch: {GITHUB_REF}  |  Commit: {GITHUB_SHA}')
          mr.font.size = Pt(10)
          mr.font.color.rgb = GREY
          doc.add_paragraph()
          np = doc.add_paragraph()
          np.alignment = WD_ALIGN_PARAGRAPH.CENTER
          nr = np.add_run(f'Generated by Google Gemini ({GEMINI_MODEL})')
          nr.font.size = Pt(10)
          nr.font.color.rgb = GREY
          doc.add_page_break()
          doc.add_heading('Summary', level=1)
          add_kv(doc, 'JAR File', JAR_NAME)
          add_kv(doc, 'Date', TODAY)
          add_kv(doc, 'Branch/Commit', f'{GITHUB_REF} / {GITHUB_SHA}')
          add_kv(doc, 'Files Documented', str(len(all_results)))
          add_kv(doc, 'Total Flows', str(total_flows))
          doc.add_paragraph()
          p = doc.add_paragraph(
              f'This document covers {len(all_results)} Mule XML file(s) and '
              f'{total_flows} flow(s) extracted from {JAR_NAME}. '
              f'Each flow section contains: overview, Mermaid flow diagram, trigger, '
              f'inputs, logic steps with inline DataWeave scripts, connectors used, '
              f'error handling, outputs, flow references, and configuration properties. '
              f'Documentation generated by Google Gemini.'
          )
          p.paragraph_format.space_after = Pt(8)
          add_divider(doc)
          doc.add_page_break()
          if not all_results:
              doc.add_paragraph('No Mule XML flow files were found or could be documented.')
          else:
              for fname, blocks in all_results:
                  doc.add_heading(f'File: {fname}', level=1)
                  if not blocks:
                      doc.add_paragraph(
                          'This file contains Mule global configurations only - no flows defined.'
                      ).italic = True
                      add_divider(doc)
                      doc.add_paragraph()
                      continue
                  for block in blocks:
                      render_flow(doc, block, fname)
                      doc.add_page_break()

          # ── Processing Summary: token usage + total time taken ──
          total_elapsed = time.time() - PROCESS_START_TIME
          doc.add_heading('Processing Summary', level=1)
          add_kv(doc, 'Total Input Tokens', f'{TOTAL_INPUT_TOKENS:,}')
          add_kv(doc, 'Total Output Tokens', f'{TOTAL_OUTPUT_TOKENS:,}')
          add_kv(doc, 'Total Tokens (Input + Output)', f'{TOTAL_TOKENS:,}')
          add_kv(doc, 'Total Time Taken', format_duration(total_elapsed))
          doc.add_paragraph()
          note = doc.add_paragraph()
          note_r = note.add_run(
              'Token counts are reported by the Gemini API per file (usage_metadata) and '
              'summed across all XML files processed. Total time covers file uploads, '
              'model calls, and document generation for this run.'
          )
          note_r.italic = True
          note_r.font.size = Pt(9)
          note_r.font.color.rgb = GREY

          doc.save(DOC_NAME)
          print(f'Saved: {DOC_NAME}')
          print(f'Total tokens - input: {TOTAL_INPUT_TOKENS}, output: {TOTAL_OUTPUT_TOKENS}, total: {TOTAL_TOKENS}')
          print(f'Total time taken: {format_duration(total_elapsed)}')
          SCRIPTEOF

      - name: Write Gemini prompt file
        run: |
          cat > /tmp/gemini_prompt.txt << 'PROMPTEOF'
          You are a senior MuleSoft integration architect and technical writer.
          You will receive a MuleSoft Mule 4 flow file as an attached XML document.
          Your task is to produce thorough, accurate, human-readable documentation for EVERY <mule:flow> and <mule:sub-flow> found in the XML.

          IMPORTANT: Read the XML carefully. Extract real values - real flow names, real paths, real DataWeave scripts, real connector names. Do not make up or guess anything.

          ===== OUTPUT FORMAT =====
          For each flow write exactly this structure between the markers shown. No text outside the markers.

          @@FLOW_START@@
          FLOW_NAME: <copy the exact name attribute from the mule:flow or mule:sub-flow element>
          FLOW_TYPE: <write: flow   OR   sub-flow>

          ##OVERVIEW##
          Write 3 to 5 sentences in plain English describing:
          - What this flow does from start to finish
          - What triggers it
          - What business problem it solves
          - What the final result or output is
          A business analyst with no technical background should be able to read this and understand the flow.

          ##FLOW DIAGRAM##
          Write a plain-text, indentation-based flow diagram showing the EXACT sequence of components in this flow, in the order they execute. Do NOT use Mermaid or any diagramming syntax - plain text only, no code fences.
          Rules:
          - Number each step in the main sequence like [1], [2], [3] and connect consecutive steps with a line containing only an arrow: -->
          - Format each step as: [N] ComponentType: key-detail  (e.g. [1] HTTP Listener: /api/orders)
          - Every single component in the XML must appear, in the same order as ##LOGIC STEPS##.
          - For a Choice Router: after its step line, indent one level and list each branch on its own line as "WHEN <exact condition from XML>:" or "OTHERWISE:", then indent again and list that branch's steps using the same [N] ComponentType: key-detail format connected with -->. After all branches, show a line "--> [merge] Continue after Choice" at the original indentation level.
          - For a Scatter-Gather: after its step line, indent one level and list each route as "ROUTE 1:", "ROUTE 2:", etc, then indent again and list that route's steps. After all routes, show "--> [merge] Continue after Scatter-Gather" at the original indentation level.
          - For a Try Scope: after its step line, indent one level, list "TRY:" with its inner steps indented under it, then list "ON ERROR:" with the error-handling steps indented under it.
          - Use 2 spaces per indentation level. Keep each line under 80 characters.
          Do NOT show a generic example - show the ACTUAL flow from the XML.

          ##TRIGGER##
          - Type: <HTTP Listener or Scheduler or File Listener or JMS Listener or VM Listener or None - read from XML>
          - Path: <exact path value if HTTP Listener - read from XML>
          - Method: <allowed methods if HTTP - read from XML>
          - Schedule: <frequency and time unit if Scheduler - read from XML>
          - Directory: <directory path if File Listener - read from XML>
          - Watermark Mode: <watermark mode if File Listener - read from XML>
          - Destination: <queue or topic name if JMS or VM - read from XML>
          - Config Ref: <exact config-ref attribute value - read from XML>

          ##INPUTS##
          - <List each type of input this flow expects. For HTTP flows: describe the expected request body shape, any required query params, required headers. For scheduled flows: state there is no inbound payload. Be specific about data types and field names if you can infer them from the DataWeave scripts.>

          ##LOGIC STEPS##
          Document EVERY component inside the flow in the order they appear in the XML.
          For each component write a step block exactly like this - do not skip any component:

          STEP 1: <Exact component type e.g. HTTP Listener, Logger, Set Variable, DataWeave Transform, DB Select, HTTP Request, Object Store Retrieve, Choice Router, Scatter-Gather, Try Scope, Flow Reference>
          Description: <Write 3 to 5 sentences in plain English explaining exactly what this step does.
          State the business purpose clearly.
          For HTTP Request: state the exact URL, method, and what data is being sent and what response is expected.
          For DB operations: state the exact table name, what columns are used, what the SQL does, what data comes back.
          For DataWeave Transform: describe exactly what the input data looks like and exactly what the output data looks like after transformation.
          For Logger: state exactly what is being logged and why.
          For Set Variable: state the variable name and what value it holds and why.
          For Choice Router: describe each condition and which path is taken for each condition.
          For Scatter-Gather: describe each parallel route and what each one does independently.
          For Try Scope: describe what is attempted and what happens if it fails.
          For Flow Reference: state which sub-flow is called and why.>
          DataWeave:
          ```
          <If this step contains a DataWeave script copy it here EXACTLY as written in the XML - every line - do not change or summarize it. If there is no DataWeave script delete this DataWeave block entirely.>
          ```

          <If this step is a Choice Router add a ROUTE block for EACH when and otherwise branch:>
          ROUTE when <exact expression from XML>:
            STEP A: <component inside this branch>
            Description: <description of this inner step>
            DataWeave:
            ```
            <script if any - verbatim>
            ```
          ROUTE otherwise:
            STEP A: <component inside otherwise branch>
            Description: <description>

          <If this step is a Scatter-Gather add a ROUTE block for EACH parallel route:>
          ROUTE 1:
            STEP A: <component>
            Description: <description>
            DataWeave:
            ```
            <script if any>
            ```
          ROUTE 2:
            STEP A: <component>
            Description: <description>

          <If this step is a Try Scope add inner steps and error handler:>
          ROUTE try:
            STEP A: <inner component>
            Description: <description>
            DataWeave:
            ```
            <script if any>
            ```
          ROUTE error-handler:
            STEP A: <on-error-continue or on-error-propagate>
            Description: <what happens on error>

          ##CONNECTORS USED##
          | Connector | Operation | Config Ref | Key Details |
          |-----------|-----------|------------|-------------|
          <One row per unique connector or Mule component. Include HTTP, DB, Object Store, File, JMS, VM, Salesforce, Logger, Set Payload, Set Variable, DataWeave, Scheduler, Flow Reference etc. Read config-ref and key attributes from the XML.>

          ##ERROR HANDLING##
          - Strategy: <on-error-propagate or on-error-continue or None - read from XML>
          - Error Types Caught: <list error types from type attribute or write ANY or None>
          - Behaviour: <plain English: what exactly happens when an error occurs in this flow>

          ##OUTPUTS##
          - Payload: <describe exactly what the final payload contains after this flow completes - data type, shape, fields>
          - Variables Set: <list every variable name set via set-variable in this flow, or write None>

          ##FLOW REFERENCES##
          <List every flow-ref name attribute found in this flow. Write None if there are none.>

          ##CONFIGURATION PROPERTIES##
          - Property Files Referenced: <If this XML file contains a <configuration-properties>, <secure-property-placeholder:config>, or similar global element that loads an external property file, list the exact file attribute value(s) referenced verbatim (e.g. config-${env}.properties). Write None if no property file is referenced.>
          - Properties Used: <List EVERY ${property.name} placeholder found anywhere in this flow's XML, one per line, in the format: property.name = <the literal value if it is visible directly in this XML (e.g. a default value syntax like ${property.name:default}), otherwise write (value defined in external property file)>. Write None if there are none.>
          @@FLOW_END@@

          ===== CRITICAL RULES =====
          1. Write one @@FLOW_START@@ to @@FLOW_END@@ block for EVERY flow and sub-flow - no exceptions.
          2. DataWeave scripts must be 100 percent complete and verbatim - copy every single line from the XML.
          3. The Mermaid diagram must show the ACTUAL flow structure from the XML - not a generic example.
          4. STEP numbers must be sequential integers: STEP 1, STEP 2, STEP 3 etc.
          5. Every STEP must have a Description - never skip it.
          6. Read real values from the XML - never invent paths, table names, variable names or URLs.
          7. Write NOTHING outside the @@FLOW_START@@ and @@FLOW_END@@ markers.
          PROMPTEOF

      - name: Run documentation generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash
          EXTRACT_DIR: ${{ env.EXTRACT_DIR }}
          JAR_NAME: ${{ env.JAR_NAME }}
        run: python3 /tmp/generate_docs.py

      - name: Commit documentation
        run: |
          JAR_BASE="${{ github.event.inputs.jar_file }}"
          DOC_NAME="${JAR_BASE%.jar}-flow-documentation.docx"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git

          git pull origin master --rebase

          git add "$DOC_NAME" || true

          if git diff --cached --quiet; then
            echo "No changes to commit — documentation is already up to date."
          else
            git commit -m "docs: Gemini-generated flow documentation for ${{ github.event.inputs.jar_file }}"
            git push origin HEAD:master
            echo "Successfully pushed to master"
          fi
