name: MuleSoft JAR Documentation Generator

on:
  workflow_dispatch:
    inputs:
      jar_file:
        description: 'JAR file name (e.g. hellomule.jar)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Validate JAR exists
        run: |
          if [ ! -f "${{ github.event.inputs.jar_file }}" ]; then
            echo "ERROR: JAR file '${{ github.event.inputs.jar_file }}' not found in repo root."
            exit 1
          fi
          echo "JAR found: ${{ github.event.inputs.jar_file }}"

      - name: Extract JAR
        run: |
          JAR_NAME="${{ github.event.inputs.jar_file }}"
          EXTRACT_DIR="extracted_${JAR_NAME%.jar}"
          mkdir -p "$EXTRACT_DIR"
          unzip -o "$JAR_NAME" -d "$EXTRACT_DIR/"
          echo "EXTRACT_DIR=$EXTRACT_DIR" >> $GITHUB_ENV
          echo "JAR_NAME=$JAR_NAME" >> $GITHUB_ENV

      - name: List extracted XML files
        run: |
          echo "XML files found in $EXTRACT_DIR:"
          find "$EXTRACT_DIR" -name "*.xml" | sort

      - name: Install Python dependencies
        run: pip install python-docx

      - name: Generate Word Documentation
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import xml.etree.ElementTree as ET
          from datetime import date
          from docx import Document
          from docx.shared import Pt, RGBColor, Inches
          from docx.enum.text import WD_ALIGN_PARAGRAPH
          from docx.oxml.ns import qn
          from docx.oxml import OxmlElement

          # ─────────────────────────────────────────────────────────────
          # CONFIG
          # ─────────────────────────────────────────────────────────────
          EXTRACT_DIR = os.environ.get('EXTRACT_DIR', 'extracted')
          JAR_NAME    = os.environ.get('JAR_NAME', 'unknown.jar')
          TODAY       = date.today().isoformat()
          GITHUB_REF  = os.environ.get('GITHUB_REF_NAME', 'N/A')
          GITHUB_SHA  = os.environ.get('GITHUB_SHA', 'N/A')[:8]

          # Output doc name = jar name without .jar
          DOC_NAME = JAR_NAME.replace('.jar', '') + '-flow-documentation.docx'

          # ─────────────────────────────────────────────────────────────
          # NAMESPACE REGISTRY — universal, works for any MuleSoft JAR
          # ─────────────────────────────────────────────────────────────
          KNOWN_NS = {
              'http://www.mulesoft.org/schema/mule/core':              'mule',
              'http://www.mulesoft.org/schema/mule/http':              'http',
              'http://www.mulesoft.org/schema/mule/db':                'db',
              'http://www.mulesoft.org/schema/mule/ee/core':           'ee',
              'http://www.mulesoft.org/schema/mule/os':                'os',
              'http://www.mulesoft.org/schema/mule/file':              'file',
              'http://www.mulesoft.org/schema/mule/salesforce':        'salesforce',
              'http://www.mulesoft.org/schema/mule/jms':               'jms',
              'http://www.mulesoft.org/schema/mule/vm':                'vm',
              'http://www.mulesoft.org/schema/mule/ftp':               'ftp',
              'http://www.mulesoft.org/schema/mule/sftp':              'sftp',
              'http://www.mulesoft.org/schema/mule/email':             'email',
              'http://www.mulesoft.org/schema/mule/sockets':           'sockets',
              'http://www.mulesoft.org/schema/mule/validation':        'validation',
              'http://www.mulesoft.org/schema/mule/aggregators':       'aggregators',
              'http://www.mulesoft.org/schema/mule/batch':             'batch',
              'http://www.mulesoft.org/schema/mule/oauth':             'oauth',
              'http://www.mulesoft.org/schema/mule/secure-properties': 'secure-properties',
              'http://www.mulesoft.org/schema/mule/compression':       'compression',
              'http://www.mulesoft.org/schema/mule/crypto':            'crypto',
              'http://www.mulesoft.org/schema/mule/json-logger':       'json-logger',
          }

          # Tags that are sub-config elements, not real flow steps
          NOISE_TAGS = {
              'bulk-input-parameters', 'sql', 'input-parameters', 'default-value',
              'value', 'query-params', 'response-validator', 'success-status-code-validator',
              'request-connection', 'listener-connection', 'scheduling-strategy',
              'fixed-frequency', 'cron', 'message', 'variables', 'body',
              'headers', 'uri-params', 'correlation-id', 'success-response',
              'failure-response', 'reconnect', 'reconnect-forever',
              'pooling-profile', 'connection', 'parameters',
          }

          # Tags that are real visible connectors/components
          CONNECTOR_TAGS = {
              'listener', 'request', 'bulk-insert', 'insert', 'update', 'delete',
              'select', 'stored-procedure', 'retrieve', 'store', 'contains', 'remove',
              'publish', 'consume', 'subscribe', 'read', 'write', 'copy', 'move', 'list',
              'query', 'create', 'upsert', 'create-job', 'batch-commit', 'execute',
              'send', 'send-email', 'smtp', 'invoke', 'call',
          }

          SKIP_DIRS = {
              '.mule', '.settings', 'cache', 'offheap-disk-store',
              'test', 'munit', 'java', 'api', 'wsdl', 'xsd',
          }

          # ─────────────────────────────────────────────────────────────
          # UTILITIES
          # ─────────────────────────────────────────────────────────────
          def get_tag(el):
              return el.tag.split('}')[-1] if '}' in el.tag else el.tag

          def get_ns_uri(el):
              return el.tag.split('}')[0].strip('{') if '}' in el.tag else ''

          def get_prefix(el):
              uri = get_ns_uri(el)
              return KNOWN_NS.get(uri, uri.split('/')[-1] if uri else 'mule')

          def safe(val, default='—'):
              return str(val).strip() if val and str(val).strip() else default

          # ─────────────────────────────────────────────────────────────
          # HUMAN-READABLE STEP DESCRIPTIONS — works for ANY connector
          # ─────────────────────────────────────────────────────────────
          def describe_element(el):
              tag    = get_tag(el)
              prefix = get_prefix(el)
              a      = el.attrib

              # Core Mule components
              if tag == 'logger':
                  msg = a.get('message','')
                  lvl = a.get('level','INFO')
                  return f"Logger ({lvl}) — logs: {msg[:80]}{'...' if len(msg)>80 else ''}"
              if tag == 'set-payload':
                  val = a.get('value','')
                  return f"Set Payload — {val[:80] if val else 'sets message payload'}"
              if tag == 'set-variable':
                  return f"Set Variable '{a.get('variableName','?')}' = {a.get('value','?')[:60]}"
              if tag == 'transform' or (prefix == 'ee' and tag == 'transform'):
                  return "DataWeave Transform — transforms message payload/variables"
              if tag == 'scatter-gather':
                  return "Scatter-Gather — executes multiple routes in parallel, merges all results"
              if tag == 'choice':
                  return "Choice Router — routes message based on conditional expression"
              if tag == 'try':
                  return "Try Scope — wraps inner steps with isolated error handling"
              if tag == 'error-handler':
                  return "Error Handler — handles errors thrown within this scope"
              if tag == 'on-error-propagate':
                  return f"On Error Propagate — propagates error (type: {a.get('type','ANY')})"
              if tag == 'on-error-continue':
                  return f"On Error Continue — swallows error and continues (type: {a.get('type','ANY')})"
              if tag == 'flow-ref':
                  return f"Flow Reference — delegates to sub-flow '{a.get('name','?')}'"
              if tag == 'scheduler':
                  return "Scheduler — triggers flow on a time-based schedule"
              if tag == 'async':
                  return "Async — executes inner processors asynchronously"
              if tag == 'foreach':
                  return f"For Each — iterates over collection '{a.get('collection','payload')}'"
              if tag == 'parallel-foreach':
                  return f"Parallel For Each — iterates in parallel over '{a.get('collection','payload')}'"
              if tag == 'until-successful':
                  return f"Until Successful — retries until success (max {a.get('maxRetries','?')} times)"
              if tag == 'first-successful':
                  return "First Successful — tries routes until one succeeds"
              if tag == 'round-robin':
                  return "Round Robin — distributes messages across routes in round-robin order"

              # HTTP
              if prefix == 'http' and tag == 'listener':
                  return f"HTTP Listener — receives {a.get('allowedMethods','ANY')} requests at '{a.get('path','?')}'"
              if prefix == 'http' and tag == 'request':
                  return f"HTTP Request ({a.get('method','GET')}) — calls '{a.get('url', a.get('path','?'))}'"

              # Database
              if prefix == 'db':
                  ops = {
                      'select':'Select — queries records from database',
                      'insert':'Insert — inserts a record into database',
                      'update':'Update — updates records in database',
                      'delete':'Delete — deletes records from database',
                      'bulk-insert':'Bulk Insert — inserts multiple records into database',
                      'bulk-update':'Bulk Update — updates multiple records in database',
                      'stored-procedure':'Stored Procedure — executes a DB stored procedure',
                  }
                  return f"DB {ops.get(tag, tag)} (config: {a.get('config-ref','?')})"

              # Object Store
              if prefix == 'os':
                  ops = {
                      'retrieve': f"Object Store Retrieve — reads key '{a.get('key','?')}' into '{a.get('target','?')}'",
                      'store':    f"Object Store Store — saves value under key '{a.get('key','?')}'",
                      'remove':   f"Object Store Remove — deletes key '{a.get('key','?')}'",
                      'contains': f"Object Store Contains — checks if key '{a.get('key','?')}' exists",
                  }
                  return ops.get(tag, f"Object Store {tag}")

              # File / FTP / SFTP
              if prefix in ('file','ftp','sftp'):
                  ops = {
                      'listener': f"{prefix.upper()} Listener — watches '{a.get('directory','?')}' for new/updated files",
                      'read':     f"{prefix.upper()} Read — reads file '{a.get('path','?')}'",
                      'write':    f"{prefix.upper()} Write — writes to '{a.get('path','?')}'",
                      'copy':     f"{prefix.upper()} Copy — copies '{a.get('sourcePath','?')}' to '{a.get('targetPath','?')}'",
                      'move':     f"{prefix.upper()} Move — moves '{a.get('sourcePath','?')}' to '{a.get('targetPath','?')}'",
                      'delete':   f"{prefix.upper()} Delete — deletes '{a.get('path','?')}'",
                      'list':     f"{prefix.upper()} List — lists files in '{a.get('directoryPath','?')}'",
                  }
                  return ops.get(tag, f"{prefix.upper()} {tag}")

              # JMS / VM
              if prefix in ('jms','vm'):
                  ops = {
                      'listener':  f"{prefix.upper()} Listener — subscribes to '{a.get('destination', a.get('queueName','?'))}'",
                      'publish':   f"{prefix.upper()} Publish — sends message to '{a.get('destination', a.get('queueName','?'))}'",
                      'consume':   f"{prefix.upper()} Consume — consumes from '{a.get('destination', a.get('queueName','?'))}'",
                      'subscribe': f"{prefix.upper()} Subscribe — subscribes to '{a.get('destination','?')}'",
                  }
                  return ops.get(tag, f"{prefix.upper()} {tag}")

              # Salesforce
              if prefix == 'salesforce':
                  return f"Salesforce {tag.replace('-',' ').title()} — object: {a.get('type', a.get('sObjectType','?'))}"

              # Email
              if prefix == 'email':
                  ops = {
                      'send': f"Email Send — sends email via config '{a.get('config-ref','?')}'",
                      'list-imap': "Email List IMAP — lists emails from IMAP inbox",
                      'list-pop3': "Email List POP3 — lists emails from POP3 inbox",
                  }
                  return ops.get(tag, f"Email {tag}")

              # Fallback — generic but readable
              config = a.get('config-ref','')
              config_str = f" (config: {config})" if config else ''
              return f"{prefix}:{tag}{config_str}"

          # ─────────────────────────────────────────────────────────────
          # MERMAID DIAGRAM GENERATOR — works for any flow structure
          # ─────────────────────────────────────────────────────────────
          def sanitize_mermaid(text):
              """Remove chars that break Mermaid labels."""
              text = str(text)
              text = re.sub(r'["\[\]{}|<>]', '', text)
              text = text.replace('\n', ' ').replace('\r', '')
              return text[:60] + ('...' if len(text) > 60 else '')

          node_counter = [0]
          def new_node():
              node_counter[0] += 1
              return f"N{node_counter[0]}"

          def build_mermaid(flow_el, flow_name):
              node_counter[0] = 0
              lines = ['graph TD']
              children = list(flow_el)
              if not children:
                  lines.append('    A[No components defined]')
                  return '\n'.join(lines)

              prev = None
              for child in children:
                  tag    = get_tag(child)
                  prefix = get_prefix(child)
                  a      = child.attrib

                  if tag in NOISE_TAGS:
                      continue

                  nid = new_node()

                  # Special shapes for routers/scopes
                  if tag == 'choice':
                      label = sanitize_mermaid('Choice Router')
                      node_def = f'    {nid}{{{label}}}'
                      lines.append(node_def)
                      if prev:
                          lines.append(f'    {prev} --> {nid}')
                      # Routes inside choice
                      route_ids = []
                      for when in child:
                          wt = get_tag(when)
                          if wt in ('when', 'otherwise'):
                              cond = sanitize_mermaid(when.attrib.get('expression', 'otherwise'))
                              rid = new_node()
                              # First child inside when
                              inner = list(when)
                              if inner:
                                  inner_tag = sanitize_mermaid(describe_element(inner[0])[:50])
                                  lines.append(f'    {rid}[{inner_tag}]')
                              else:
                                  lines.append(f'    {rid}[{wt}]')
                              lines.append(f'    {nid} -->|{cond}| {rid}')
                              route_ids.append(rid)
                      # Merge point
                      mid = new_node()
                      lines.append(f'    {mid}[Response]')
                      for rid in route_ids:
                          lines.append(f'    {rid} --> {mid}')
                      prev = mid
                      continue

                  elif tag == 'scatter-gather':
                      label = sanitize_mermaid('Scatter-Gather')
                      lines.append(f'    {nid}[{label}]')
                      if prev:
                          lines.append(f'    {prev} --> {nid}')
                      route_ids = []
                      for ri, route in enumerate(child, 1):
                          rt = get_tag(route)
                          if rt in NOISE_TAGS:
                              continue
                          rid = new_node()
                          inner = list(route)
                          inner_label = sanitize_mermaid(describe_element(inner[0])[:45]) if inner else f'Route {ri}'
                          lines.append(f'    {rid}[Route {ri}: {inner_label}]')
                          lines.append(f'    {nid} --> {rid}')
                          route_ids.append(rid)
                      mid = new_node()
                      lines.append(f'    {mid}[Merge Results]')
                      for rid in route_ids:
                          lines.append(f'    {rid} --> {mid}')
                      prev = mid
                      continue

                  elif tag == 'try':
                      label = sanitize_mermaid('Try Scope')
                      lines.append(f'    {nid}[{label}]')
                      if prev:
                          lines.append(f'    {prev} --> {nid}')
                      inner_prev = nid
                      for inner in child:
                          it = get_tag(inner)
                          if it in ('error-handler',) or it in NOISE_TAGS:
                              continue
                          iid = new_node()
                          ilabel = sanitize_mermaid(describe_element(inner)[:50])
                          lines.append(f'    {iid}[{ilabel}]')
                          lines.append(f'    {inner_prev} --> {iid}')
                          inner_prev = iid
                      # Error handler branch
                      for inner in child:
                          if get_tag(inner) == 'error-handler':
                              eid = new_node()
                              lines.append(f'    {eid}[On Error: continue]')
                              lines.append(f'    {nid} -->|error| {eid}')
                      prev = inner_prev
                      continue

                  elif tag == 'foreach' or tag == 'parallel-foreach':
                      col = sanitize_mermaid(a.get('collection', 'payload')[:30])
                      label = f"{'Parallel ' if tag=='parallel-foreach' else ''}For Each: {col}"
                      lines.append(f'    {nid}[{sanitize_mermaid(label)}]')
                      if prev:
                          lines.append(f'    {prev} --> {nid}')
                      inner_prev = nid
                      for inner in child:
                          if get_tag(inner) in NOISE_TAGS:
                              continue
                          iid = new_node()
                          ilabel = sanitize_mermaid(describe_element(inner)[:50])
                          lines.append(f'    {iid}[{ilabel}]')
                          lines.append(f'    {inner_prev} --> {iid}')
                          inner_prev = iid
                      prev = inner_prev
                      continue

                  elif tag == 'error-handler':
                      for handler in child:
                          ht = get_tag(handler)
                          eid = new_node()
                          err_type = sanitize_mermaid(handler.attrib.get('type','ANY'))
                          lines.append(f'    {eid}[{ht}: {err_type}]')
                          if prev:
                              lines.append(f'    {prev} -->|error| {eid}')
                      continue

                  # Generic component
                  desc = sanitize_mermaid(describe_element(child)[:55])

                  # Use diamond for routers, rounded for rest
                  if tag in ('choice',):
                      lines.append(f'    {nid}{{{desc}}}')
                  else:
                      lines.append(f'    {nid}[{desc}]')

                  if prev:
                      lines.append(f'    {prev} --> {nid}')
                  prev = nid

              return '\n'.join(lines)

          # ─────────────────────────────────────────────────────────────
          # DATAWEAVE EXTRACTOR — collects ALL DW scripts from any element
          # ─────────────────────────────────────────────────────────────
          def extract_dataweave(flow_el):
              """
              Returns list of (parent_context, script) tuples.
              Deduplicates by script content.
              Collects from:
                - ee:set-payload (ee:transform body)
                - ee:set-variable (ee:transform variables)
                - set-payload value attribute if it starts with #[
                - db:input-parameters, db:bulk-input-parameters
                - os:value / os:default-value
                - http:query-params / http:body / http:headers
                - any element whose text looks like DataWeave
              """
              scripts = []
              seen   = set()
              EE_NS  = 'http://www.mulesoft.org/schema/mule/ee/core'

              def add(context, script):
                  script = script.strip()
                  if script and script not in seen:
                      seen.add(script)
                      scripts.append((context, script))

              for el in flow_el.iter():
                  tag    = get_tag(el)
                  prefix = get_prefix(el)
                  parent_tag = get_tag(el.getparent()) if hasattr(el, 'getparent') else ''

                  # ee:transform → ee:message → ee:set-payload
                  if el.tag == f'{{{EE_NS}}}set-payload' and el.text:
                      # Find parent transform
                      add('ee:transform → payload', el.text)

                  # ee:transform → ee:variables → ee:set-variable
                  if el.tag == f'{{{EE_NS}}}set-variable' and el.text:
                      vname = el.attrib.get('variableName','?')
                      add(f'ee:transform → variable "{vname}"', el.text)

                  # set-payload value with inline DW
                  if tag == 'set-payload':
                      val = el.attrib.get('value','')
                      if val.startswith('#['):
                          add('set-payload (inline)', val)
                      if el.text and el.text.strip():
                          add('set-payload (body)', el.text)

                  # db input parameters
                  if tag in ('input-parameters','bulk-input-parameters') and el.text:
                      add(f'db:{get_tag(el)} parameters', el.text)

                  # os value / default-value
                  if tag in ('value','default-value') and prefix == 'os' and el.text:
                      add(f'os:{tag}', el.text)

                  # http query-params / body / headers inline DW
                  if tag in ('query-params','body','headers') and prefix == 'http' and el.text:
                      add(f'http:{tag}', el.text)

                  # logger message inline DW
                  if tag == 'logger':
                      msg = el.attrib.get('message','')
                      if msg.startswith('#['):
                          add('logger (inline DW)', msg)

                  # Any text node that looks like DataWeave
                  if el.text and el.text.strip().startswith('%dw'):
                      add(f'{prefix}:{tag} (body)', el.text)

              return scripts

          # ─────────────────────────────────────────────────────────────
          # CONNECTOR TABLE EXTRACTOR — universal
          # ─────────────────────────────────────────────────────────────
          def extract_connectors(flow_el):
              """Returns list of (connector, operation, config_ref, notes) tuples."""
              rows = []
              seen = set()

              CONNECTOR_PREFIXES = {
                  'http','db','os','file','ftp','sftp','jms','vm',
                  'salesforce','email','sockets','compression','crypto',
                  'aggregators','batch','oauth','validation','json-logger',
              }
              # Also include core mule components
              CORE_COMPONENTS = {
                  'logger','set-payload','set-variable','transform',
                  'scatter-gather','choice','flow-ref','foreach',
                  'parallel-foreach','try','async','until-successful',
                  'first-successful','round-robin','scheduler',
              }

              for el in flow_el.iter():
                  tag    = get_tag(el)
                  prefix = get_prefix(el)

                  if tag in NOISE_TAGS:
                      continue

                  is_connector = prefix in CONNECTOR_PREFIXES
                  is_core      = (prefix == 'mule' or prefix == 'ee') and tag in CORE_COMPONENTS

                  if not (is_connector or is_core):
                      continue

                  # Build readable connector name
                  if prefix in ('mule',''):
                      connector = tag.replace('-',' ').title()
                  else:
                      connector = f"{prefix.upper()} / {tag.replace('-',' ').title()}"

                  operation  = tag.replace('-',' ').title()
                  config_ref = el.attrib.get('config-ref', '—')

                  # Notes
                  a = el.attrib
                  notes_parts = []
                  for attr in ('path','url','directory','destination','queueName',
                               'key','variableName','collection','name','type',
                               'allowedMethods','method','level','watermarkMode'):
                      v = a.get(attr)
                      if v:
                          notes_parts.append(f"{attr}={v[:40]}")
                  notes = ', '.join(notes_parts[:3]) if notes_parts else '—'

                  key = f"{connector}::{operation}"
                  if key not in seen:
                      seen.add(key)
                      rows.append((connector, operation, config_ref, notes))

              return rows

          # ─────────────────────────────────────────────────────────────
          # CONFIG PROPERTIES & FLOW REFS EXTRACTOR
          # ─────────────────────────────────────────────────────────────
          def extract_config_props(flow_el):
              props = set()
              for el in flow_el.iter():
                  for val in el.attrib.values():
                      for match in re.findall(r'\$\{[^}]+\}', val):
                          props.add(match)
                  if el.text:
                      for match in re.findall(r'\$\{[^}]+\}', el.text):
                          props.add(match)
              return sorted(props)

          def extract_flow_refs(flow_el):
              refs = []
              for el in flow_el.iter():
                  if get_tag(el) == 'flow-ref':
                      refs.append(el.attrib.get('name','?'))
              return refs

          def extract_error_handling(flow_el):
              handlers = []
              for el in flow_el.iter():
                  if get_tag(el) == 'error-handler':
                      for handler in el:
                          strategy   = get_tag(handler)
                          error_type = handler.attrib.get('type','ANY')
                          notify     = handler.attrib.get('enableNotifications','true')
                          handlers.append((strategy, error_type, notify))
              return handlers

          def extract_outputs(flow_el):
              """Detect set-variable and last transform to infer outputs."""
              vars_set = []
              for el in flow_el.iter():
                  if get_tag(el) == 'set-variable':
                      vname = el.attrib.get('variableName','?')
                      if vname not in vars_set:
                          vars_set.append(vname)
              return vars_set

          # ─────────────────────────────────────────────────────────────
          # WORD DOC STYLING HELPERS
          # ─────────────────────────────────────────────────────────────
          BLUE_DARK  = RGBColor(0x1F, 0x49, 0x7D)
          BLUE_MID   = RGBColor(0x2E, 0x75, 0xB6)
          BLUE_LIGHT = RGBColor(0x44, 0x72, 0xC4)
          WHITE      = RGBColor(0xFF, 0xFF, 0xFF)
          GREY_TEXT  = RGBColor(0x44, 0x44, 0x44)
          CODE_COLOR = RGBColor(0x1A, 0x1A, 0x1A)

          def shade_cell(cell, hex_color):
              tc   = cell._tc
              tcPr = tc.get_or_add_tcPr()
              shd  = OxmlElement('w:shd')
              shd.set(qn('w:val'),   'clear')
              shd.set(qn('w:color'), 'auto')
              shd.set(qn('w:fill'),  hex_color)
              tcPr.append(shd)

          def add_divider(doc):
              p   = doc.add_paragraph()
              p.paragraph_format.space_before = Pt(4)
              p.paragraph_format.space_after  = Pt(4)
              pPr = p._p.get_or_add_pPr()
              pBdr   = OxmlElement('w:pBdr')
              bottom = OxmlElement('w:bottom')
              bottom.set(qn('w:val'),   'single')
              bottom.set(qn('w:sz'),    '6')
              bottom.set(qn('w:space'), '1')
              bottom.set(qn('w:color'), '2E75B6')
              pBdr.append(bottom)
              pPr.append(pBdr)

          def add_kv(doc, key, value, indent=False):
              p = doc.add_paragraph()
              p.paragraph_format.space_after = Pt(2)
              if indent:
                  p.paragraph_format.left_indent = Inches(0.2)
              r1 = p.add_run(f"{key}: ")
              r1.bold = True
              r1.font.color.rgb = BLUE_DARK
              r2 = p.add_run(safe(value))
              r2.font.color.rgb = GREY_TEXT

          def add_bullet(doc, text, indent=0.2):
              p = doc.add_paragraph(style='List Bullet')
              p.paragraph_format.left_indent  = Inches(indent)
              p.paragraph_format.space_after  = Pt(2)
              p.add_run(text).font.size = Pt(10)

          def add_code_block(doc, code, label=None):
              if label:
                  p = doc.add_paragraph()
                  p.paragraph_format.space_after = Pt(1)
                  r = p.add_run(label)
                  r.bold = True
                  r.font.size = Pt(10)
                  r.font.color.rgb = BLUE_DARK
              p = doc.add_paragraph()
              p.paragraph_format.left_indent  = Inches(0.3)
              p.paragraph_format.space_before = Pt(2)
              p.paragraph_format.space_after  = Pt(8)
              run = p.add_run(code.strip())
              run.font.name  = 'Courier New'
              run.font.size  = Pt(9)
              run.font.color.rgb = CODE_COLOR

          def add_table(doc, headers, rows, col_widths):
              if not rows:
                  doc.add_paragraph("None").italic = True
                  return
              table = doc.add_table(rows=1, cols=len(headers))
              table.style = 'Table Grid'
              hdr_cells = table.rows[0].cells
              for i, h in enumerate(headers):
                  hdr_cells[i].width = Inches(col_widths[i])
                  shade_cell(hdr_cells[i], '2E75B6')
                  p   = hdr_cells[i].paragraphs[0]
                  run = p.add_run(h)
                  run.bold = True
                  run.font.color.rgb = WHITE
                  run.font.size = Pt(10)
              for ri, row_data in enumerate(rows):
                  row_cells = table.add_row().cells
                  fill = 'EBF3FB' if ri % 2 == 0 else 'FFFFFF'
                  for i, cell_text in enumerate(row_data):
                      row_cells[i].width = Inches(col_widths[i])
                      shade_cell(row_cells[i], fill)
                      p   = row_cells[i].paragraphs[0]
                      run = p.add_run(safe(cell_text))
                      run.font.size = Pt(9)

          # ─────────────────────────────────────────────────────────────
          # PARSE TRIGGER (universal)
          # ─────────────────────────────────────────────────────────────
          def parse_trigger(flow_el):
              """Returns dict of trigger details for any trigger type."""
              children = list(flow_el)
              if not children:
                  return {'type': 'None', 'details': {}}

              trigger = children[0]
              tag     = get_tag(trigger)
              prefix  = get_prefix(trigger)
              a       = trigger.attrib
              details = {}

              if tag == 'listener' and prefix == 'http':
                  details = {
                      'Type':       'HTTP Listener',
                      'Path':       a.get('path','—'),
                      'Method':     a.get('allowedMethods','ANY (not restricted)'),
                      'Config Ref': a.get('config-ref','—'),
                  }
              elif tag == 'listener' and prefix == 'file':
                  details = {'Type': 'File Listener (On New or Updated File)'}
                  details['Directory']     = a.get('directory','—')
                  details['Move To']       = a.get('moveToDirectory','—')
                  details['Watermark Mode']= a.get('watermarkMode','—')
                  details['Config Ref']    = a.get('config-ref','—')
                  for s in trigger.iter():
                      if get_tag(s) == 'fixed-frequency':
                          details['Schedule'] = f"Every {s.attrib.get('frequency','?')} {s.attrib.get('timeUnit','?')}"
              elif tag == 'listener' and prefix in ('ftp','sftp'):
                  details = {
                      'Type':      f'{prefix.upper()} Listener',
                      'Directory': a.get('directory','—'),
                      'Config Ref':a.get('config-ref','—'),
                  }
                  for s in trigger.iter():
                      if get_tag(s) == 'fixed-frequency':
                          details['Schedule'] = f"Every {s.attrib.get('frequency','?')} {s.attrib.get('timeUnit','?')}"
              elif tag == 'scheduler':
                  details = {'Type': 'Scheduler'}
                  for s in trigger.iter():
                      if get_tag(s) == 'fixed-frequency':
                          details['Schedule'] = f"Fixed frequency — every {s.attrib.get('frequency','?')} {s.attrib.get('timeUnit','?')}"
                      if get_tag(s) == 'cron':
                          details['Cron Expression'] = s.attrib.get('expression','—')
                          details['Time Zone']        = s.attrib.get('timeZone','—')
              elif tag == 'listener' and prefix == 'jms':
                  details = {
                      'Type':        'JMS Listener',
                      'Destination': a.get('destination', a.get('queueName','—')),
                      'Config Ref':  a.get('config-ref','—'),
                  }
              elif tag == 'listener' and prefix == 'vm':
                  details = {
                      'Type':      'VM Listener',
                      'Queue':     a.get('queueName','—'),
                      'Config Ref':a.get('config-ref','—'),
                  }
              elif tag == 'logger':
                  details = {'Type': 'None (no trigger — orphan/utility flow that starts with Logger)'}
              else:
                  details = {
                      'Type':      f'{prefix}:{tag}',
                      'Config Ref':a.get('config-ref','—'),
                  }
                  details.update({k: v for k, v in a.items() if k != 'config-ref'})

              return details

          # ─────────────────────────────────────────────────────────────
          # DOCUMENT A SINGLE FLOW
          # ─────────────────────────────────────────────────────────────
          def document_flow(doc, flow_el, filename):
              flow_name = flow_el.attrib.get('name','Unnamed Flow')
              flow_type = get_tag(flow_el)
              children  = list(flow_el)

              # ── Flow heading
              doc.add_heading(f"Flow: `{flow_name}`", level=2)
              add_kv(doc, 'Source File', filename)
              add_kv(doc, 'Flow Type',   flow_type)

              # ── Overview
              doc.add_heading('Overview', level=3)
              trigger_details = parse_trigger(flow_el)
              ttype = trigger_details.get('Type','Unknown')
              step_count = len([c for c in children if get_tag(c) not in NOISE_TAGS])
              # Generic overview paragraph — works for any flow
              tpath  = trigger_details.get('Path','')
              tsched = trigger_details.get('Schedule','')
              tdir   = trigger_details.get('Directory','')
              if 'HTTP' in ttype and tpath:
                  overview = (f"An HTTP-triggered flow listening at `{tpath}`. "
                              f"It contains {step_count} processing step(s). "
                              f"Review the Logic Steps section below for full details.")
              elif 'Scheduler' in ttype or tsched:
                  overview = (f"A scheduled flow that runs automatically ({tsched or 'on schedule'}). "
                              f"It contains {step_count} processing step(s). "
                              f"Review the Logic Steps section below for full details.")
              elif 'File' in ttype and tdir:
                  overview = (f"A file-listener flow monitoring directory `{tdir}`. "
                              f"It contains {step_count} processing step(s). "
                              f"Review the Logic Steps section below for full details.")
              elif 'JMS' in ttype or 'VM' in ttype:
                  dest = trigger_details.get('Destination', trigger_details.get('Queue','?'))
                  overview = (f"A message-listener flow subscribing to `{dest}`. "
                              f"It contains {step_count} processing step(s).")
              elif 'None' in ttype or 'orphan' in ttype.lower():
                  overview = ("A utility or debug flow with no trigger. "
                              "It cannot be invoked automatically and is likely called via flow-ref or used for debugging.")
              else:
                  overview = (f"A `{flow_type}` triggered by `{ttype}` with {step_count} processing step(s).")

              p = doc.add_paragraph(overview)
              p.paragraph_format.space_after = Pt(8)

              # ── Flow Diagram
              doc.add_heading('Flow Diagram', level=3)
              mermaid_code = build_mermaid(flow_el, flow_name)
              add_code_block(doc, mermaid_code)

              # ── Trigger
              doc.add_heading('Trigger', level=3)
              for k, v in trigger_details.items():
                  add_kv(doc, k, v, indent=True)

              # ── Inputs
              doc.add_heading('Inputs', level=3)
              trigger_tag = get_tag(list(flow_el)[0]) if children else ''
              if trigger_tag == 'listener' and trigger_details.get('Type','').startswith('HTTP'):
                  add_bullet(doc, 'Payload: Depends on HTTP method and client request body')
                  add_bullet(doc, f"Query Params: Inspect `{trigger_details.get('Path','')}` usage in logic steps")
                  add_bullet(doc, 'Headers: As provided by the HTTP client')
              elif 'Scheduler' in trigger_details.get('Type','') or trigger_tag == 'scheduler':
                  add_bullet(doc, 'Payload: None (scheduler-triggered, no inbound payload)')
                  add_bullet(doc, 'Variables: Set internally by the flow')
              elif 'File' in trigger_details.get('Type',''):
                  add_bullet(doc, 'Payload: File content (triggered by new/updated file)')
                  add_bullet(doc, 'Attributes: File name, size, timestamps, path')
              elif 'JMS' in trigger_details.get('Type','') or 'VM' in trigger_details.get('Type',''):
                  add_bullet(doc, 'Payload: Message body from the queue/topic')
                  add_bullet(doc, 'Attributes: Message headers and properties')
              else:
                  add_bullet(doc, 'Payload: Depends on caller / trigger type')

              # ── Logic Steps
              doc.add_heading('Logic Steps', level=3)
              step_rows = []
              step_num  = 1
              for child in children:
                  tag = get_tag(child)
                  if tag in NOISE_TAGS:
                      continue
                  desc = describe_element(child)
                  step_rows.append([str(step_num), desc])
                  step_num += 1

              if step_rows:
                  add_table(doc, ['Step', 'Description'], step_rows, [0.5, 5.8])
              else:
                  doc.add_paragraph("No logic steps found.").italic = True
              doc.add_paragraph()

              # ── DataWeave Transformations
              doc.add_heading('DataWeave Transformations', level=3)
              dw_scripts = extract_dataweave(flow_el)
              if dw_scripts:
                  for idx, (context, script) in enumerate(dw_scripts, 1):
                      add_code_block(doc, script, label=f"Transform {idx} — {context}")
              else:
                  doc.add_paragraph("None").italic = True
              doc.add_paragraph()

              # ── Connectors & Components
              doc.add_heading('Connectors & Components Used', level=3)
              connector_rows = extract_connectors(flow_el)
              if connector_rows:
                  add_table(doc,
                            ['Connector', 'Operation', 'Config Ref', 'Notes'],
                            connector_rows,
                            [1.5, 1.2, 1.5, 2.1])
              else:
                  doc.add_paragraph("None detected.").italic = True
              doc.add_paragraph()

              # ── Error Handling
              doc.add_heading('Error Handling', level=3)
              handlers = extract_error_handling(flow_el)
              if handlers:
                  for strategy, error_type, notify in handlers:
                      add_kv(doc, 'Strategy',           strategy,    indent=True)
                      add_kv(doc, 'Error Types Caught', error_type,  indent=True)
                      add_kv(doc, 'Notifications',      notify,      indent=True)
                      if strategy == 'on-error-continue':
                          add_bullet(doc, 'Behaviour: Logs and continues — parent scope does not fail')
                      else:
                          add_bullet(doc, 'Behaviour: Propagates error to calling flow or default error handler')
              else:
                  add_bullet(doc, 'Strategy: None explicitly defined')
                  add_bullet(doc, 'Error Types Caught: None')
                  add_bullet(doc, 'Handler Logic: Errors propagate to default Mule error handler')

              # ── Outputs
              doc.add_heading('Outputs', level=3)
              vars_set = extract_outputs(flow_el)
              add_bullet(doc, 'Payload: As set by the last transform or connector in the flow')
              if vars_set:
                  add_bullet(doc, f"Variables Set: {', '.join(vars_set)}")
              else:
                  add_bullet(doc, 'Variables Set: None')

              # ── Flow References
              doc.add_heading('Flow References', level=3)
              refs = extract_flow_refs(flow_el)
              if refs:
                  for ref in refs:
                      add_bullet(doc, f"`{ref}` — called via flow-ref")
              else:
                  doc.add_paragraph("None").italic = True

              # ── Config Properties
              doc.add_heading('Configuration Properties Used', level=3)
              props = extract_config_props(flow_el)
              if props:
                  for p in props:
                      add_bullet(doc, p)
              else:
                  doc.add_paragraph("None").italic = True

              add_divider(doc)
              doc.add_paragraph()

          # ─────────────────────────────────────────────────────────────
          # FIND XML FILES
          # ─────────────────────────────────────────────────────────────
          xml_files      = []
          seen_filenames = set()

          for search_root in [
              os.path.join(EXTRACT_DIR, 'META-INF', 'mule-src'),
              EXTRACT_DIR,
          ]:
              if not os.path.exists(search_root):
                  continue
              for root, dirs, files in os.walk(search_root):
                  dirs[:] = [d for d in dirs if d not in SKIP_DIRS]
                  for f in sorted(files):
                      if f.endswith('.xml') and f not in seen_filenames:
                          seen_filenames.add(f)
                          xml_files.append(os.path.join(root, f))

          print(f"\nFound {len(xml_files)} unique XML file(s):")
          for xf in xml_files:
              print(f"  {xf}")

          # ─────────────────────────────────────────────────────────────
          # BUILD DOCUMENT
          # ─────────────────────────────────────────────────────────────
          doc = Document()

          # ── Cover page
          title_p = doc.add_paragraph()
          title_p.alignment = WD_ALIGN_PARAGRAPH.CENTER
          tr = title_p.add_run("MuleSoft Flow Documentation")
          tr.bold = True
          tr.font.size = Pt(28)
          tr.font.color.rgb = BLUE_DARK

          doc.add_paragraph()
          sub_p = doc.add_paragraph()
          sub_p.alignment = WD_ALIGN_PARAGRAPH.CENTER
          sr = sub_p.add_run(f"Generated from: {JAR_NAME}")
          sr.font.size = Pt(13)
          sr.font.color.rgb = BLUE_LIGHT

          doc.add_paragraph()
          meta_p = doc.add_paragraph()
          meta_p.alignment = WD_ALIGN_PARAGRAPH.CENTER
          mr = meta_p.add_run(f"Date: {TODAY}  |  Branch: {GITHUB_REF}  |  Commit: {GITHUB_SHA}")
          mr.font.size = Pt(10)
          mr.font.color.rgb = GREY_TEXT

          doc.add_page_break()

          # ── Summary section
          doc.add_heading("Summary", level=1)
          file_names = [os.path.basename(x) for x in xml_files]
          add_kv(doc, "Generated from", ', '.join(f"`{f}`" for f in file_names))
          add_kv(doc, "Date",           TODAY)
          add_kv(doc, "Branch / Commit",f"{GITHUB_REF} / {GITHUB_SHA}")
          doc.add_paragraph()

          # Count total flows
          total_flows = 0
          for xml_path in xml_files:
              try:
                  tree   = ET.parse(xml_path)
                  rel    = tree.getroot()
                  total_flows += len(
                      rel.findall('{http://www.mulesoft.org/schema/mule/core}flow') +
                      rel.findall('{http://www.mulesoft.org/schema/mule/core}sub-flow')
                  )
              except:
                  pass

          p = doc.add_paragraph(
              f"This documentation covers {len(xml_files)} XML file(s) and {total_flows} flow(s) "
              f"extracted from `{JAR_NAME}`. Each flow section below includes a Mermaid diagram, "
              f"full DataWeave scripts verbatim, trigger details, logic steps, connectors used, "
              f"error handling strategy, outputs, flow references, and configuration properties."
          )
          p.paragraph_format.space_after = Pt(8)
          add_divider(doc)
          doc.add_page_break()

          # ── Per-file, per-flow documentation
          if not xml_files:
              doc.add_paragraph("No XML flow files found in extracted JAR contents.")
          else:
              for xml_path in xml_files:
                  fname = os.path.basename(xml_path)
                  try:
                      tree   = ET.parse(xml_path)
                      root_el = tree.getroot()

                      # Register all namespaces found in this file dynamically
                      for el in root_el.iter():
                          uri = get_ns_uri(el)
                          if uri and uri not in KNOWN_NS:
                              short = uri.split('/')[-1].split('.')[-1]
                              KNOWN_NS[uri] = short

                      flows = (
                          root_el.findall('{http://www.mulesoft.org/schema/mule/core}flow') +
                          root_el.findall('{http://www.mulesoft.org/schema/mule/core}sub-flow')
                      )

                      doc.add_heading(f"File: `{fname}`", level=1)

                      if not flows:
                          p = doc.add_paragraph(
                              f"> This file contains a Mule XML skeleton with no flows defined — "
                              f"only namespace declarations or global configs. "
                              f"No flow documentation is generated for this file."
                          )
                          p.paragraph_format.space_after = Pt(8)
                          add_divider(doc)
                          doc.add_paragraph()
                          continue

                      for flow in flows:
                          document_flow(doc, flow, fname)
                          doc.add_page_break()

                  except ET.ParseError as e:
                      doc.add_heading(f"File: `{fname}`", level=1)
                      doc.add_paragraph(f"Could not parse this file: {e}")
                      add_divider(doc)

          # ── Quality Checklist
          doc.add_heading("Quality Checklist", level=1)
          checks = [
              "Every flow and sub-flow in every XML file is completely documented.",
              "A Mermaid flow diagram is generated for every flow.",
              "All DataWeave scripts are included verbatim (not summarized or truncated).",
              "Trigger details are specific (path, method, schedule expression, etc.).",
              "Input and output shapes are described for each flow.",
              "Files with no flows are noted explicitly.",
              "Document name matches JAR file name.",
          ]
          for check in checks:
              add_bullet(doc, f"[x] {check}")

          doc.save(DOC_NAME)
          print(f"\nDone — saved as: {DOC_NAME}")
          PYEOF

      - name: Commit documentation
        run: |
          JAR_BASE="${{ github.event.inputs.jar_file }}"
          DOC_NAME="${JAR_BASE%.jar}-flow-documentation.docx"
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add "${{ env.EXTRACT_DIR }}/" "$DOC_NAME"
          git commit -m "docs: generated flow documentation for ${{ github.event.inputs.jar_file }}"
          git push
